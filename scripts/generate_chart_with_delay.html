<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Generate Chart - Auto Download</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        #status {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        #chart { margin: 20px 0; }
    </style>
</head>
<body>
    <div id="status">Loading chart and auto-downloading in 3 seconds...</div>
    <div id="chart"></div>

    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script>
        // Model results with complete metrics
        const data = [
            {model: 'Mean baseline', rmse: 32.0, mae: 23.3, r2: -0.001, split: 'random'},
            {model: 'Linear weather', rmse: 25.9, mae: 18.2, r2: 0.345, split: 'random'},
            {model: 'Random Forest', rmse: 20.0, mae: 13.3, r2: 0.610, split: 'random'},
            {model: 'HGB weather', rmse: 19.5, mae: 13.0, r2: 0.629, split: 'random'},
            {model: 'HGB weather+time', rmse: 14.6, mae: 9.1, r2: 0.793, split: 'random'},
            {model: 'HGB rich lags<br>(chronological)', rmse: 14.5, mae: 8.5, r2: 0.814, split: 'chronological'},
            {model: 'HGB rich lags', rmse: 10.8, mae: 6.8, r2: 0.883, split: 'random'},
            {model: 'Blend rich lags', rmse: 10.7, mae: 6.7, r2: 0.886, split: 'random'}
        ];

        // Sort from worst to best (descending RMSE)
        data.sort((a, b) => b.rmse - a.rmse);

        const models = data.map(d => d.model);
        const rmse = data.map(d => d.rmse);

        // Create color gradient from red (worst) to green (best)
        const colors = rmse.map((val, idx) => {
            const ratio = idx / (rmse.length - 1);
            let r, g, b;
            if (ratio < 0.5) {
                r = 255;
                g = Math.round(255 * ratio * 2);
                b = 0;
            } else {
                r = Math.round(255 * (1 - (ratio - 0.5) * 2));
                g = 255;
                b = 0;
            }
            return `rgb(${r},${g},${b})`;
        });

        const hoverText = data.map(d =>
            `<b>${d.model.replace('<br>', ' ')}</b><br>` +
            `RMSE: ${d.rmse.toFixed(1)} µg/m³<br>` +
            `MAE: ${d.mae.toFixed(1)} µg/m³<br>` +
            `R²: ${d.r2.toFixed(3)}<br>` +
            `Split: ${d.split}`
        );

        const trace = {
            type: 'bar',
            x: rmse,
            y: models,
            orientation: 'h',
            text: rmse.map(r => r.toFixed(1)),
            textposition: 'outside',
            textfont: {
                size: 14,
                color: 'black',
                family: 'Arial, sans-serif',
                weight: 'bold'
            },
            hovertext: hoverText,
            hoverinfo: 'text',
            marker: {
                color: colors,
                line: {
                    color: 'black',
                    width: 1.5
                }
            }
        };

        const baseline_rmse = data[0].rmse;
        const best_rmse = data[data.length - 1].rmse;
        const improvement = 100 * (baseline_rmse - best_rmse) / baseline_rmse;

        const layout = {
            title: {
                text: '<b>Hanoi PM2.5 Model Comparison (2018)</b><br>Ordered by RMSE: Worst to Best',
                font: {
                    size: 20,
                    family: 'Arial, sans-serif'
                }
            },
            xaxis: {
                title: {
                    text: '<b>RMSE (µg/m³)</b>',
                    font: {size: 16}
                },
                gridcolor: '#e0e0e0',
                gridwidth: 1,
                range: [0, Math.max(...rmse) * 1.18]
            },
            yaxis: {
                title: {
                    text: '<b>Model</b>',
                    font: {size: 16}
                },
                automargin: true,
                tickfont: {size: 13}
            },
            margin: {l: 220, r: 80, t: 120, b: 80},
            plot_bgcolor: 'white',
            paper_bgcolor: 'white',
            annotations: [{
                text: `Total improvement: ${improvement.toFixed(1)}%`,
                xref: 'paper',
                yref: 'paper',
                x: 0.98,
                y: 0.02,
                showarrow: false,
                font: {
                    size: 12,
                    style: 'italic'
                },
                bgcolor: 'wheat',
                borderpad: 8,
                opacity: 0.8
            }],
            width: 1200,
            height: 700
        };

        const config = {
            responsive: true,
            toImageButtonOptions: {
                format: 'png',
                filename: 'pm25-ai-assisted-modeling-2026',
                height: 700,
                width: 1200,
                scale: 2
            }
        };

        // Render the chart
        Plotly.newPlot('chart', [trace], layout, config).then(function() {
            document.getElementById('status').innerHTML =
                '✓ Chart rendered! Auto-downloading in 3 seconds... (or click the camera icon)';

            // Auto-download after 3 seconds
            setTimeout(function() {
                Plotly.downloadImage('chart', {
                    format: 'png',
                    width: 1200,
                    height: 700,
                    filename: 'pm25-ai-assisted-modeling-2026'
                });
                document.getElementById('status').innerHTML =
                    '✓ Download started! Check your Downloads folder for: pm25-ai-assisted-modeling-2026.png';
            }, 3000);
        });

        // Log verification
        console.log('='.repeat(60));
        console.log('Chart rendered with 8 models:');
        data.forEach((d, i) => {
            console.log(`${i+1}. ${d.model.replace('<br>', ' ').padEnd(35)} RMSE=${d.rmse}`);
        });
        console.log('='.repeat(60));
    </script>
</body>
</html>
