<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Generate 2018 PM2.5 Model Comparison Chart</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        #chart {
            margin: 20px 0;
        }
        #instructions {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        button {
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
        }
        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <h1>Hanoi PM2.5 Model Comparison (2018)</h1>

    <div id="instructions">
        <h3>Instructions to Save Chart:</h3>
        <ol>
            <li>The chart will render below</li>
            <li>Click "Download PNG" button to save as image</li>
            <li>Or right-click on chart → "Save image as..."</li>
            <li>Move the downloaded file to: <code>assets/images/research/pm25-ai-assisted-modeling-2026.png</code></li>
        </ol>
    </div>

    <button onclick="downloadChart()">Download PNG (1200x700)</button>
    <button onclick="downloadChartHiRes()">Download PNG (High-Res 2400x1400)</button>

    <div id="chart"></div>

    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script>
        // Model results with complete metrics
        const data = [
            {model: 'Mean baseline', rmse: 32.0, mae: 23.3, r2: -0.001, split: 'random'},
            {model: 'Linear weather', rmse: 25.9, mae: 18.2, r2: 0.345, split: 'random'},
            {model: 'Random Forest', rmse: 20.0, mae: 13.3, r2: 0.610, split: 'random'},
            {model: 'HGB weather', rmse: 19.5, mae: 13.0, r2: 0.629, split: 'random'},
            {model: 'HGB weather+time', rmse: 14.6, mae: 9.1, r2: 0.793, split: 'random'},
            {model: 'HGB rich lags<br>(chronological)', rmse: 14.5, mae: 8.5, r2: 0.814, split: 'chronological'},
            {model: 'HGB rich lags', rmse: 10.8, mae: 6.8, r2: 0.883, split: 'random'},
            {model: 'Blend rich lags', rmse: 10.7, mae: 6.7, r2: 0.886, split: 'random'}
        ];

        // Sort from worst to best (descending RMSE)
        data.sort((a, b) => b.rmse - a.rmse);

        const models = data.map(d => d.model);
        const rmse = data.map(d => d.rmse);

        // Create color gradient from red (worst) to green (best)
        const colors = rmse.map((val, idx) => {
            const ratio = idx / (rmse.length - 1);
            let r, g, b;

            if (ratio < 0.5) {
                // Red to yellow
                r = 255;
                g = Math.round(255 * ratio * 2);
                b = 0;
            } else {
                // Yellow to green
                r = Math.round(255 * (1 - (ratio - 0.5) * 2));
                g = 255;
                b = 0;
            }
            return `rgb(${r},${g},${b})`;
        });

        // Create hover text with all metrics
        const hoverText = data.map(d =>
            `<b>${d.model.replace('<br>', ' ')}</b><br>` +
            `RMSE: ${d.rmse.toFixed(1)} µg/m³<br>` +
            `MAE: ${d.mae.toFixed(1)} µg/m³<br>` +
            `R²: ${d.r2.toFixed(3)}<br>` +
            `Split: ${d.split}`
        );

        const trace = {
            type: 'bar',
            x: rmse,
            y: models,
            orientation: 'h',
            text: rmse.map(r => r.toFixed(1)),
            textposition: 'outside',
            textfont: {
                size: 14,
                color: 'black',
                family: 'Arial, sans-serif',
                weight: 'bold'
            },
            hovertext: hoverText,
            hoverinfo: 'text',
            marker: {
                color: colors,
                line: {
                    color: 'black',
                    width: 1.5
                }
            }
        };

        const baseline_rmse = data[0].rmse;
        const best_rmse = data[data.length - 1].rmse;
        const improvement = 100 * (baseline_rmse - best_rmse) / baseline_rmse;

        const layout = {
            title: {
                text: '<b>Hanoi PM2.5 Model Comparison (2018)</b><br>Ordered by RMSE: Worst to Best',
                font: {
                    size: 20,
                    family: 'Arial, sans-serif'
                }
            },
            xaxis: {
                title: {
                    text: '<b>RMSE (µg/m³)</b>',
                    font: {size: 16}
                },
                gridcolor: '#e0e0e0',
                gridwidth: 1,
                range: [0, Math.max(...rmse) * 1.18]
            },
            yaxis: {
                title: {
                    text: '<b>Model</b>',
                    font: {size: 16}
                },
                automargin: true,
                tickfont: {size: 13}
            },
            margin: {l: 220, r: 80, t: 120, b: 80},
            plot_bgcolor: 'white',
            paper_bgcolor: 'white',
            annotations: [{
                text: `Total improvement: ${improvement.toFixed(1)}%`,
                xref: 'paper',
                yref: 'paper',
                x: 0.98,
                y: 0.02,
                showarrow: false,
                font: {
                    size: 12,
                    style: 'italic'
                },
                bgcolor: 'wheat',
                borderpad: 8,
                opacity: 0.8
            }],
            width: 1200,
            height: 700
        };

        const config = {
            responsive: true,
            toImageButtonOptions: {
                format: 'png',
                filename: 'pm25-ai-assisted-modeling-2026',
                height: 700,
                width: 1200,
                scale: 2
            }
        };

        Plotly.newPlot('chart', [trace], layout, config);

        // Download functions
        function downloadChart() {
            Plotly.downloadImage('chart', {
                format: 'png',
                width: 1200,
                height: 700,
                filename: 'pm25-ai-assisted-modeling-2026'
            });
        }

        function downloadChartHiRes() {
            Plotly.downloadImage('chart', {
                format: 'png',
                width: 2400,
                height: 1400,
                filename: 'pm25-ai-assisted-modeling-2026-hires'
            });
        }

        // Log results to console
        console.log('Model Performance (sorted worst to best by RMSE):');
        console.log('='.repeat(80));
        console.log('Model'.padEnd(35) + 'RMSE'.padStart(8) + 'MAE'.padStart(8) + 'R²'.padStart(8));
        console.log('-'.repeat(80));
        data.forEach(d => {
            const modelClean = d.model.replace('<br>', ' ');
            console.log(
                modelClean.padEnd(35) +
                d.rmse.toFixed(1).padStart(8) +
                d.mae.toFixed(1).padStart(8) +
                d.r2.toFixed(3).padStart(8)
            );
        });
        console.log('='.repeat(80));
        console.log(`Best model: ${data[data.length-1].model.replace('<br>', ' ')}`);
        console.log(`  RMSE: ${data[data.length-1].rmse.toFixed(1)} µg/m³`);
        console.log(`  MAE: ${data[data.length-1].mae.toFixed(1)} µg/m³`);
        console.log(`  R²: ${data[data.length-1].r2.toFixed(3)}`);
        console.log(`\nWorst model: ${data[0].model}`);
        console.log(`  RMSE: ${data[0].rmse.toFixed(1)} µg/m³`);
        console.log(`\nImprovement: ${(data[0].rmse - data[data.length-1].rmse).toFixed(1)} µg/m³ (${improvement.toFixed(1)}%)`);
    </script>
</body>
</html>
