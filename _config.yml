# Site settings
title: Binh Ng.
description: Hardware builds, IoT sensors, environmental monitoring, and home lab projects
url: "https://bi2air.github.io"
baseurl: ""

# Theme
remote_theme: just-the-docs/just-the-docs@v0.8.2
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-remote-theme

kramdown:
  math_engine: mathjax
  syntax_highlighter: rouge

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

heading_anchors: true

# Navigation
aux_links:
  "GitHub":
    - "https://github.com/bi2air"
aux_links_new_tab: true

# Footer
footer_content: "Copyright &copy; 2025-2026 Binh Ng."
color_scheme: light

back_to_top: true
back_to_top_text: "Back to top"

last_edit_timestamp: true
last_edit_time_format: "%b %e %Y at %I:%M %p"

gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/bi2air/bi2air.github.io"
gh_edit_branch: "main"
gh_edit_view_mode: "tree"

# Exclude from processing
exclude:
  - blog
  - docs
  - Gemfile
  - Gemfile.lock
  - bioinfo
  - skyi
  - wayback_latest_b-io_info
  - doc-work
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md
