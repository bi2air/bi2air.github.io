<div id="plotly-2018-comparison" style="width:100%;height:700px;"></div>

<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<script>
(function() {
    const data = [
        {model: 'Mean baseline', rmse: 32.0, mae: 23.3, r2: -0.001},
        {model: 'Linear weather', rmse: 25.9, mae: 18.2, r2: 0.345},
        {model: 'Random Forest', rmse: 20.0, mae: 13.3, r2: 0.610},
        {model: 'HGB weather', rmse: 19.5, mae: 13.0, r2: 0.629},
        {model: 'HGB weather+time', rmse: 14.6, mae: 9.1, r2: 0.793},
        {model: 'HGB rich lags (chronological)', rmse: 14.5, mae: 8.5, r2: 0.814},
        {model: 'HGB rich lags', rmse: 10.8, mae: 6.8, r2: 0.883},
        {model: 'Blend rich lags', rmse: 10.7, mae: 6.7, r2: 0.886}
    ];

    data.sort((a, b) => b.rmse - a.rmse);

    const models = data.map(d => d.model);
    const rmse = data.map(d => d.rmse);

    const colors = rmse.map((val, idx) => {
        const ratio = idx / (rmse.length - 1);
        let r, g, b;
        if (ratio < 0.5) {
            r = 255;
            g = Math.round(255 * ratio * 2);
            b = 0;
        } else {
            r = Math.round(255 * (1 - (ratio - 0.5) * 2));
            g = 255;
            b = 0;
        }
        return `rgb(${r},${g},${b})`;
    });

    const hoverText = data.map(d =>
        `<b>${d.model}</b><br>` +
        `RMSE: ${d.rmse.toFixed(1)} µg/m³<br>` +
        `MAE: ${d.mae.toFixed(1)} µg/m³<br>` +
        `R²: ${d.r2.toFixed(3)}`
    );

    const trace = {
        type: 'bar',
        x: rmse,
        y: models,
        orientation: 'h',
        text: rmse.map(r => r.toFixed(1)),
        textposition: 'outside',
        textfont: {size: 14, color: 'black', family: 'Arial', weight: 'bold'},
        hovertext: hoverText,
        hoverinfo: 'text',
        marker: {
            color: colors,
            line: {color: 'black', width: 1.5}
        }
    };

    const baseline_rmse = data[0].rmse;
    const best_rmse = data[data.length - 1].rmse;
    const improvement = 100 * (baseline_rmse - best_rmse) / baseline_rmse;

    const layout = {
        title: {
            text: '<b>Hanoi PM2.5 Model Comparison (2018)</b><br>Ordered by RMSE: Worst to Best',
            font: {size: 18, family: 'Arial'}
        },
        xaxis: {
            title: {text: '<b>RMSE (µg/m³)</b>', font: {size: 14}},
            gridcolor: '#e0e0e0',
            range: [0, Math.max(...rmse) * 1.18]
        },
        yaxis: {
            title: {text: '<b>Model</b>', font: {size: 14}},
            automargin: true,
            tickfont: {size: 12}
        },
        margin: {l: 200, r: 80, t: 100, b: 80},
        plot_bgcolor: 'white',
        paper_bgcolor: 'white',
        annotations: [{
            text: `Total improvement: ${improvement.toFixed(1)}%`,
            xref: 'paper',
            yref: 'paper',
            x: 0.98,
            y: 0.02,
            showarrow: false,
            font: {size: 11, style: 'italic'},
            bgcolor: 'wheat',
            borderpad: 8,
            opacity: 0.8
        }]
    };

    const config = {
        responsive: true,
        displayModeBar: true,
        toImageButtonOptions: {
            format: 'png',
            filename: 'pm25-comparison-2018',
            height: 700,
            width: 1200,
            scale: 2
        }
    };

    Plotly.newPlot('plotly-2018-comparison', [trace], layout, config);
})();
</script>
