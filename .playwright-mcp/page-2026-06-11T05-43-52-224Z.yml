        - generic [ref=e78]:
          - paragraph [ref=e83]: The NSW Department of Climate Change, Energy, the Environment and Water (DCCEEW) and NSW Health have created air quality categories to guide you on what activities you can do, based on the air quality in your area.
          - paragraph [ref=e86]: Air pollution has a significant impact on human health and the economy. It is important to protect your health when air quality is poor by modifying your activities.
          - generic [ref=e88]:
            - heading "Go with the colours to protect your health" [level=2] [ref=e89]
            - paragraph [ref=e90]:
              - text: Air quality measurements from your local monitoring station are summarised using 5
              - strong [ref=e91]:
                - link "air quality categories (AQC)" [ref=e92] [cursor=pointer]:
                  - /url: https://www.airquality.nsw.gov.au/health-advice/air-quality-categories
              - text: ", rating air quality as 'Good', 'Fair', 'Poor', 'Very Poor' or 'Extremely Poor'."
            - paragraph [ref=e93]:
              - text: The five colours of
              - strong [ref=e94]:
                - link "air quality categories (AQC)" [ref=e95] [cursor=pointer]:
                  - /url: https://www.airquality.nsw.gov.au/health-advice/air-quality-categories
              - text: — green, yellow, orange, red, and darker red—mirror the traffic light signals, representing varying levels of air pollution from good to hazardous, much like the progression from 'go' to 'stop' in traffic. By following the colours as described in the
              - strong [ref=e96]:
                - link "activity guide" [ref=e97] [cursor=pointer]:
                  - /url: "#activity"
              - text: below, you will be able to understand how current air quality might affect your health.
