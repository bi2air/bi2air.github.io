        - paragraph [ref=e49]:
          - text: The above chart depicts analysis-based and predicted distribution of surface concentration at the 0 - 1 km level and total amounts in the atmosphere for 0.5-degree latitude and longitude grids. The outer frame is light purple in analysis-based charts and maroon in prediction charts. Surface concentration and total amounts can be selected via the pulldown menu. The regions of Japan (20 - 50° N, 110 - 150° E) and Asia (20 - 50° N, 80 - 150° E) can be specified using the pulldown menu, with Japan as the default setting. The chart is updated every morning at around 6 a.m. (JST).
          - text: Small amounts of Aeolian dust may be observed outside colored areas.
        - paragraph [ref=e50]:
          - text: Topographic expression is based on ETOPO1 (elevation and depth data for 1-minute latitude and longitude grids) created by the National Centers for Environmental Information, NESDIS, NOAA, and the U.S. Department of Commerce.
          - text: "The figures on this page were created using Generic Mapping Tools open-source software (GMT; Wessel et al., Generic Mapping Tools: Improved Version Released, EOS Trans. AGU, 94(45), 409-410, 2013. doi:10.1002/2013EO450001)"
