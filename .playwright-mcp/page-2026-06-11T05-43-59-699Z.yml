        - heading "Smoke and air quality information" [level=1] [ref=e64]
        - generic [ref=e65]:
          - paragraph [ref=e66]: The Bureau of Meteorology works closely with state and territory fire agencies to support their operations and keep Australians safe.
          - paragraph [ref=e67]: State and territory health and environment agencies are responsible for monitoring bushfire smoke and warning the community when the air quality exceeds safe levels.
          - paragraph [ref=e68]: The Bureau will include information about smoke haze on forecasts when this is expected to be significant – this should prompt you to check for more information from your local authority.
          - paragraph [ref=e69]: Please see links below for further information on bushfire smoke alerts and health information for each state and territory in Australia.
          - heading "Australia wide" [level=2] [ref=e70]
