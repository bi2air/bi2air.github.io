              - time [ref=e110]: 14 November 2024
            - article [ref=e112]:
              - generic [ref=e114]:
                - heading "About the Agreement" [level=2] [ref=e116]
                - paragraph [ref=e117]: The National Clean Air Agreement helps governments identify and prioritise actions to address air quality issues.
                - paragraph [ref=e118]: Australia’s environment ministers established the agreement on 15 December 2015.
                - paragraph [ref=e119]: The agreement sets a framework for national collaboration on air quality issues to deliver health, environmental and economic outcomes for Australians.
                - paragraph [ref=e120]: The agreement’s work plan lists the environment ministers proposed actions, roles, responsibilities and timeframes for implementing the actions. It is reviewed and updated every two years.
                - list [ref=e121]:
                  - listitem [ref=e122]:
                    - link "Read the National Clean Air Agreement" [ref=e123] [cursor=pointer]:
                      - /url: /environment/protection/air-quality/publications/national-clean-air-agreement
                    - text: .
                - heading "2021-23 work plan" [level=2] [ref=e124]
                - paragraph [ref=e125]: The National Clean Air Agreement 2021-23 work plan details the rolling program of activities to respond to air quality priorities.
                - paragraph [ref=e126]: The senior officials group (SOG) agreed to this work plan out of session on 10 May 2022.
                - paragraph [ref=e127]: This work plan builds on collaborative achievements of the previous work plans. It includes a range of projects across the four strategic approaches set out by the agreement.
                - list [ref=e128]:
                  - listitem [ref=e129]:
                    - link "Read the 2021-23 work plan" [ref=e130] [cursor=pointer]:
                      - /url: /environment/protection/air-quality/publications/national-clean-air-agreement-work-plan-2021-23
                    - text: .
                - heading "Achievements" [level=2] [ref=e131]
                - heading "2018-20 work plan" [level=3] [ref=e132]
                - paragraph [ref=e133]: "Actions on the 2018-2020 work plan included:"
                - list [ref=e134]:
                  - listitem [ref=e135]: strengthened ambient air quality standards for sulfur dioxide, nitrogen dioxide and ozone
                  - listitem [ref=e136]: reviewed legislative instruments made under the Fuel Quality Standards Act 2000.
                  - listitem [ref=e137]:
                    - link "read the 2018-2020 work plan review report" [ref=e138] [cursor=pointer]:
                      - /url: /environment/protection/air-quality/publications/national-clean-air-agreement-2018-20-work-plan-review-report
                  - listitem [ref=e139]:
                    - link "read the 2018-2020 work plan" [ref=e140] [cursor=pointer]:
                      - /url: /environment/protection/air-quality/publications/national-clean-air-agreement-2018-20-work-plan
                    - text: .
                - heading "2015-2017 work plan" [level=3] [ref=e141]
                - paragraph [ref=e142]: "Actions delivered under the 2015-17 work plan included:"
                - list [ref=e143]:
                  - listitem [ref=e144]: strengthened ambient air quality reporting standards for particle (particulate matter or PM) pollution
                  - listitem [ref=e145]: the introduction of product emissions standards for new outdoor power equipment and marine engines (such as garden equipment and outboard motors), which commenced on 11 January 2018.
                  - listitem [ref=e146]:
                    - link "read the 2015-2017 work plan review report" [ref=e147] [cursor=pointer]:
                      - /url: /environment/protection/air-quality/publications/national-clean-air-agreement-review-2015-17-work-plan
                    - text: .
