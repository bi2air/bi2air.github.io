        - generic [ref=e72]:
          - heading "International Cooperative for Aerosol Prediction (ICAP)" [level=1] [ref=e73]
          - paragraph [ref=e74]: ICAP is an international forum for aerosol forecast centers, remote sensing data providers, and lead systems developers to share best practices and discuss pressing issues facing the operational aerosol community. While the dynamical meteorology community has well-developed protocols and near real-time observing systems to support forecasting, the aerosol community is only beginning to organize. Infrastructure and data protocols need to be developed between operational centers in order to fully support this emerging field.
          - 'heading "13th Technical Working Group Meeting: Interoperability and the Vertical Dimension" [level=2] [ref=e75]'
          - paragraph [ref=e76]: November 8-10, 2023 • Darmstadt, Germany
          - paragraph [ref=e77]: The purpose of the 13th Working Group Meeting of the International Cooperative for Aerosol Prediction is to survey the state of vertical profile data records and their utilization in informing and evaluating global aerosol prediction models. Challenges include data exchange/interoperability for measurements and models alike, near-real time delivery and utilization of data, ingestion of data into aerosol data assimilation systems, and interoperability to foster wide utility of these data products across divergent model platforms and in conjunction with synergistic datasets. Expert talks will be invited related to aerosol remote sensing, data assimilation, and modeling, and the meeting will update on the progress of the individual aerosol modeling centers.
