    - listitem [ref=e25]: How to use the model to achieve the research purpose
    - listitem [ref=e26]: Data used to drive the model (initial and boundary conditions, etc.)
    - listitem [ref=e27]: Overview if you plan to modify the model
    - listitem [ref=e28]: Schedule of research
