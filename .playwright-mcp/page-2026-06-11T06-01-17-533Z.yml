- generic [active] [ref=e1]:
  - heading "Application for use of Japan Meteorological Agency's regional-scale meteorology-chemistry model" [level=1] [ref=e2]
  - heading "Application procedure" [level=2] [ref=e3]
  - paragraph [ref=e4]: The Japan Meteorological Agency (JMA) lends the regional-scale meteorology-chemistry model to users for the purpose of research using models related to atmospheric trace chemical substances.
  - text: The lending is for
  - paragraph
  - list [ref=e5]:
    - listitem [ref=e6]: Regional-scale meteorology-chemistry model（NHM-Chem）
  - paragraph [ref=e7]: If you would like to lend, please submit the application form shown in the example below and the outline of the research plan. After confirming the research content and deciding whether to lend, the model will be lent under the stated conditions.
  - paragraph [ref=e8]: When the research using the lended model is completed, please contact us according to the "Example email for the end of lending" below.
  - heading "Term of conditions" [level=2] [ref=e9]
  - list [ref=e10]:
    - listitem [ref=e11]: Use for research purposes only, not for business or commercial purposes.
    - listitem [ref=e12]: Do not provide this model or modified models to third parties.
    - listitem [ref=e13]: Provide the results of research and modified models to JMA and ensure that JMA is free to use.
    - listitem [ref=e14]: When publishing the research results using this model and the modified model as research presentations at academic societies or printed materials, it should be clearly stated that the research uses the model of JMA.
    - listitem [ref=e15]: Do not hold JMA responsible for any consequences resulting from defects in this model.
    - listitem [ref=e16]: This model and the modified model shall be returned to JMA as soon as the research is completed
  - heading "Example of application email" [level=2] [ref=e17]
  - paragraph [ref=e18]: Please let us know the model you want to use, the person in charge of use, the purpose of research, and the contact information by email.
  - generic [ref=e19]: 1 Model type NHM-Chem 2 user Sakuhei FUJIWARA 3 Research purpose Research on air quality in East Asia 4 Desired period of use April 1, 2020 - March 31, 2023 5 Contact information for use Street address Contact name Phone number E-mail address
  - heading "Outline of research plan" [level=2] [ref=e20]
  - paragraph [ref=e21]: When submitting the application for use, please also submit the outline of the research plan, including the following contents.
  - list [ref=e22]:
