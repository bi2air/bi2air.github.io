        - generic [ref=e92]:
          - heading "Variation to Ambient Air Quality NEPM - ozone, nitrogen dioxide and sulfur dioxide" [level=1] [ref=e94]
          - article [ref=e96]:
            - generic [ref=e98]:
              - paragraph [ref=e99]: "2021"
              - paragraph [ref=e100]: At its meeting on 15 April 2021, the National Environment Protection Council (NEPC) agreed to vary the AAQ NEPM by approving an amending instrument to the AAQ NEPM. The amending instrument took effect on 18 May 2021, the day after it was registered on the Federal Register of Legislative Instruments (FRLI).
              - list [ref=e101]:
                - listitem [ref=e102]:
                  - link "Key changes to the Ambient Air Quality Measure agreed by Ministers April 2021 " [ref=e103] [cursor=pointer]:
                    - /url: /sites/default/files/2022-09/key-changes-aaq-measure-agreed-ministers-april-2021.pdf
              - paragraph [ref=e104]: In approving the amendments, the NEPC took into account the Impact Statement and information received during public consultation on this proposed variation. NEPC’s responses to the feedback received are available in the Summary of Submissions and Response document.
              - list [ref=e105]:
                - listitem [ref=e106]:
                  - link "Public consultation on proposed variation - summary of submissions and response " [ref=e107] [cursor=pointer]:
                    - /url: /sites/default/files/2022-09/aaq-nepm-variation-summary-public-submissions-and-response.pdf
              - paragraph [ref=e108]: "The amendment, taking into account the latest scientific evidence about the health impacts, includes:"
              - list [ref=e109]:
                - listitem [ref=e110]:
                  - text: establish an O
                  - subscript [ref=e111]: "3"
                  - text: standard with an 8-hour averaging period that reflects the health evidence and its use internationally, with a numerical value of 65 ppb.
                - listitem [ref=e112]:
                  - text: significantly strengthen NO
                  - subscript [ref=e113]: "2"
                  - text: reporting standards for 1-hour and annual average NO
                  - subscript [ref=e114]: "2"
                  - text: to 80 ppb and 15 ppb respectively, bringing forward standards initially proposed for 2025. This will make them tighter than the World Health Organization guidelines. This reflects the most recent health evidence emerging about the health impacts of NO
                  - subscript [ref=e115]: "2"
                  - text: .
                - listitem [ref=e116]:
                  - text: significantly strengthen SO
                  - subscript [ref=e117]: "2"
                  - text: reporting standards for 1-hour and 24-hour SO
                  - subscript [ref=e118]: "2"
                  - text: to 100 ppb and 20 ppb respectively to make them some of the tightest in the world. The 1-hour SO
                  - subscript [ref=e119]: "2"
                  - text: standard will be strengthened again in 2025 to 75 ppb.
                - listitem [ref=e120]:
                  - text: remove annual SO
                  - subscript [ref=e121]: "2"
                  - text: and 1-hour and 4-hour O
                  - subscript [ref=e122]: "3"
                  - text: averaging periods to align the standards with the recent health evidence and for consistency with many international agencies.
                - listitem [ref=e123]: change the form of the standards to the maximum value with no allowable exceedances providing the most transparency for reporting purposes.
                - listitem [ref=e124]:
                  - text: apply the existing exceptional events rule that applies to the particle standards to O
                  - subscript [ref=e125]: "3"
                  - text: given the linkages between elevated O3 levels and fire events. This rule is used by jurisdictions to determine compliance with the standards.
                - listitem [ref=e126]:
                  - text: extend annual reporting of population exposure from particles as PM2.5 to O
                  - subscript [ref=e127]: "3"
                  - text: and NO
                  - subscript [ref=e128]: "2"
                  - text: given the widespread exposure across whole populations.
              - heading "Ambient Air Quality NEPM – FRLI" [level=2] [ref=e129]
              - paragraph [ref=e130]: "For further information regarding the amending instrument, including explanatory statement, visit:"
              - list [ref=e131]:
                - listitem [ref=e132]:
                  - link "Variation to the National Environment Protection (Ambient Air Quality) Measure 2021 " [ref=e133] [cursor=pointer]:
                    - /url: https://www.legislation.gov.au/Details/F2021L00585
              - heading "Further information" [level=2] [ref=e134]
