    - generic [ref=e56]:
      - main [ref=e57]:
        - 'heading "AQFx: The platform" [level=1] [ref=e58]'
        - generic [ref=e59]:
          - heading "What we do" [level=2] [ref=e60]
          - paragraph [ref=e61]: "We develop and operate AQFx, Australia’s national prototype smoke forecasting system, designed to support communities, emergency services, and environment and health departments with timely and accurate air quality information. AQFx delivers:"
          - list [ref=e62]:
            - listitem [ref=e63]: Six-day ensemble fire weather forecasts
            - listitem [ref=e64]: Detailed air pollution forecasts (24–96 hours)
            - listitem [ref=e65]: Next-day prescribed burn smoke forecasts for Victoria and New South Wales
          - paragraph [ref=e66]: The system is managed by the Bureau of Meteorology in Victoria on behalf of the Department of Energy, Environment and Climate Action (DEECA), and in New South Wales for the Rural Fire Service (RFS).
          - paragraph [ref=e67]
          - paragraph [ref=e68]:
            - generic [ref=e69]:
              - text: Since the 2019–20 fire season, we’ve been working closely with end-users to test and refine potential enhancements to the operational
              - link "AQFx" [ref=e70] [cursor=pointer]:
                - /url: https://www.csiro.au/en/research/disasters/bushfires/Smoke-forecasting
              - text: "system. Our current priorities include:"
          - list [ref=e71]:
            - listitem [ref=e72]: Advancing scientific research and near real-time data capabilities to ensure robust, accurate, timely and nationally consistent forecasts for smoke, dust, and other air quality hazards.
            - listitem [ref=e73]: Delivering detailed forecasts to key stakeholders – including State and Territory fire and emergency services, environment and health departments – and making this information accessible to the public.
            - listitem [ref=e74]: Empowering decision makers with the tools and insights needed to issue health advisories, plan operations, and reduce the risks associated with smoke exposure.
          - paragraph [ref=e75]: Our long-term focus will integrate AQFx into the Air Quality Visualisation System (AQVx) and the AirRater smartphone app, expanding its reach and impact across Australia.
          - heading "How it was developed" [level=2] [ref=e76]
          - paragraph [ref=e77]:
            - link "AQFx" [ref=e78] [cursor=pointer]:
              - /url: https://www.csiro.au/en/research/disasters/bushfires/Smoke-forecasting
            - text: was developed in 2016 through a research collaboration between CSIRO, the Bureau of Meteorology, the University of Tasmania, the University of Sydney, the University of Melbourne, and the Victorian Department of Energy, Environment and Climate Action (DEECA, formerly DELWP). Designed as a decision-support tool, AQFx aims to minimise population exposure to smoke from planned burns. The system has been operationally run by the Bureau of Meteorology in Victoria since 2018, and in New South Wales since 2021.
          - paragraph [ref=e79]: The success of AQFx relies on a strong, collaborative network of end users who actively contribute to its ongoing development. Through continuous engagement, the AQFx team works closely with stakeholders to co-design a system that is not only scientifically robust but also intuitive and practical for real-world use. To support this collaboration, we develop and maintain cutting-edge communication tools that make it easier for users to interact with the system, provide feedback, and access the information they need.
          - heading "Funding acknowledgement" [level=2] [ref=e80]
          - paragraph [ref=e81]:
            - text: Following the 2019–2020 bushfires, the Department of Home Affairs (DHA) funded CSIRO to develop a national prototype system, AQFx_p. In 2021, the
            - link "Australian Climate Service (ACS)" [ref=e82] [cursor=pointer]:
              - /url: https://www.acs.gov.au/
            - text: provided additional funding, enabling further development and innovation in smoke forecasting across Australia.
          - paragraph [ref=e83]
