              - text: or see your doctor.
            - listitem [ref=e200]:
              - text: If you or anyone in your care has trouble breathing or tightness in the chest, call triple zero (
              - link "000" [ref=e201] [cursor=pointer]:
                - /url: tel:000
              - text: ) for an ambulance.
          - heading "Advice for people sensitive to air pollution" [level=4] [ref=e202]
          - paragraph [ref=e203]:
            - strong [ref=e204]: Take action
            - text: "to reduce your exposure to polluted air using one or more of these strategies:"
          - list [ref=e205]:
