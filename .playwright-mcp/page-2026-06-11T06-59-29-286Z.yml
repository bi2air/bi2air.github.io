        - generic [ref=e99]:
          - paragraph [ref=e100]:
            - text: Our
            - link "Check air and water quality map" [ref=e101] [cursor=pointer]:
              - /url: /check-air-and-water-quality
            - text: gives you current air quality information and forecasts air quality for the next 24 hours.
          - paragraph [ref=e102]: "We use 5 categories to describe the overall air quality at each of our monitoring sites across Victoria:"
          - list [ref=e103]:
            - listitem [ref=e104]: Good
            - listitem [ref=e105]: Fair
            - listitem [ref=e106]: Poor
            - listitem [ref=e107]: Very Poor
            - listitem [ref=e108]: Extremely Poor
          - paragraph [ref=e109]: Poor, Very Poor or Extremely Poor means the level of a pollutant is higher than its air quality guideline or standard. 'No data' means there is no data available.
          - paragraph [ref=e110]: We give general health advice for each category. This includes steps you can take to protect yourself from the short-term effects of air pollution.
          - paragraph [ref=e111]: "We also give advice for people sensitive to air pollution. These are:"
          - list [ref=e112]:
            - listitem [ref=e113]: people with a heart or lung condition, including asthma
            - listitem [ref=e114]: people over the age of 65
            - listitem [ref=e115]: infants and young children
            - listitem [ref=e116]: pregnant people
            - listitem [ref=e117]: people with diabetes.
          - paragraph [ref=e118]:
            - text: Learn more about
            - link "how we monitor air quality" [ref=e119] [cursor=pointer]:
              - /url: /how-we-monitor-air-quality
            - text: through AirWatch.
          - heading "What is AirWatch" [level=3] [ref=e120]
          - paragraph [ref=e121]: "AirWatch is our reporting tool that helps you stay informed about local air quality and how to protect your health. It provides:"
          - list [ref=e122]:
            - listitem [ref=e123]: hourly air quality data for different pollutants at each site, including any incident sites
            - listitem [ref=e124]: hourly air quality ratings for each site
            - listitem [ref=e125]: daily regional air quality forecasts.
          - paragraph [ref=e126]: AirWatch collects data 24/7 all year round, giving you real-time, up-to-date information across Victoria.
          - paragraph [ref=e127]:
            - text: Visit
            - link "Air pollution" [ref=e128] [cursor=pointer]:
              - /url: /air-pollution
            - text: to learn more about managing your health and air pollution.
        - generic [ref=e130]:
          - heading "Air quality categories" [level=2] [ref=e131]
          - heading "Good" [level=3] [ref=e132]
          - paragraph [ref=e133]: Air pollution is at usual background levels.
          - heading "Advice for the general community" [level=4] [ref=e134]
          - paragraph [ref=e135]: No change needed to your normal outdoor activities.
          - heading "Advice for people sensitive to air pollution" [level=4] [ref=e136]
          - paragraph [ref=e137]: No change needed to your normal outdoor activities.
          - heading "Fair" [level=3] [ref=e138]
          - paragraph [ref=e139]: Air pollution is above usual background levels.
          - heading "Advice for the general community" [level=4] [ref=e140]
          - paragraph [ref=e141]: Keep track of conditions. No change needed to your normal outdoor activities.
          - heading "Advice for people sensitive to air pollution" [level=4] [ref=e142]
          - list [ref=e143]:
            - listitem [ref=e144]: Keep track of conditions, and be prepared to take action if air quality gets to Poor, Very Poor or Extremely Poor.
            - listitem [ref=e145]: Monitor any health conditions.
          - heading "Poor" [level=3] [ref=e146]
          - paragraph [ref=e147]: The air is likely to be dusty or smoky.
          - heading "Advice for the general community" [level=4] [ref=e148]
          - list [ref=e149]:
            - listitem [ref=e150]: Keep track of conditions.
            - listitem [ref=e151]: Consider taking steps to reduce your exposure to polluted air if poor conditions last longer than one day.
            - listitem [ref=e152]: See advice for the general community under Very Poor, below, for a list of actions to consider.
          - heading "Advice for people sensitive to air pollution" [level=4] [ref=e153]
          - paragraph [ref=e154]: "Consider taking steps to reduce your exposure to polluted air using one or more of these strategies:"
          - list [ref=e155]:
            - listitem [ref=e156]: Reduce outdoor physical activity, especially if you develop symptoms like coughing or shortness of breath.
            - listitem [ref=e157]: Keep track of conditions, and consider closing windows and doors until outdoor air quality is better.
            - listitem [ref=e158]: Use a portable air cleaner with a HEPA filter if you have access to one.
            - listitem [ref=e159]: Use a P2 or N95 mask, but seek advice from your doctor if you have a pre-existing heart or lung condition.
            - listitem [ref=e160]: Go to a place with cleaner air – such as an air-conditioned building like a library or shopping centre – if it's safe to do so.
            - listitem [ref=e161]:
              - text: Follow the treatment plan recommended by your doctor. If you're concerned about symptoms, call Nurse-on-Call on
              - link "1300 60 60 24" [ref=e162] [cursor=pointer]:
                - /url: tel:1300606024
              - text: or see your doctor.
            - listitem [ref=e163]:
              - text: If you or anyone in your care has trouble breathing or tightness in the chest, call triple zero (
              - link "000" [ref=e164] [cursor=pointer]:
                - /url: tel:000
              - text: ) for an ambulance.
          - heading "Very Poor" [level=3] [ref=e165]
          - paragraph [ref=e166]: The air is very dusty or smoky.
          - heading "Advice for the general community" [level=4] [ref=e167]
          - paragraph [ref=e168]: "Consider taking one or more of the following steps to reduce your exposure to polluted air:"
          - list [ref=e169]:
            - listitem [ref=e170]: Reduce outdoor physical activity, especially if you develop symptoms like coughing or shortness of breath.
            - listitem [ref=e171]: Keep track of conditions, and consider closing windows and doors until outdoor air quality is better.
            - listitem [ref=e172]: Use a portable air cleaner with a HEPA filter if you have access to one.
            - listitem [ref=e173]: Use a P2 or N95 mask, but seek advice from your doctor if you have a pre-existing heart or lung condition.
            - listitem [ref=e174]: Go to a place with cleaner air – such as an air-conditioned building like a library or shopping centre – if it's safe to do so.
          - heading "Advice for people sensitive to air pollution" [level=4] [ref=e175]
          - paragraph [ref=e176]:
            - strong [ref=e177]: Take action
            - text: "to reduce your exposure to polluted air, especially if you have a medical condition that is not under good control. Use one or more of these strategies:"
          - list [ref=e178]:
            - listitem [ref=e179]: Avoid outdoor physical activity if you develop symptoms like cough or shortness of breath.
            - listitem [ref=e180]: When indoors, close windows and doors until outdoor air quality is better.
            - listitem [ref=e181]: Use a portable air cleaner with a HEPA filter if you have access to one.
            - listitem [ref=e182]: Use a P2 or N95 mask when outdoors, but seek advice from your doctor if you have a pre-existing heart or lung condition.
            - listitem [ref=e183]: Go to a place with cleaner air – such as an air-conditioned building like a library or shopping centre – if it's safe to do so.
            - listitem [ref=e184]:
              - text: Follow the treatment plan recommended by your doctor. If you're concerned about symptoms, call Nurse-on-Call on
              - link "1300 60 60 24" [ref=e185] [cursor=pointer]:
                - /url: tel:1300606024
              - text: or see your doctor.
            - listitem [ref=e186]:
              - text: If you or anyone in your care has trouble breathing or tightness in the chest, call triple zero (
              - link "000" [ref=e187] [cursor=pointer]:
                - /url: tel:000
              - text: ) for an ambulance.
          - heading "Extremely poor" [level=3] [ref=e188]
          - paragraph [ref=e189]: The air is very dusty or smoky.
          - heading "Advice for the general community" [level=4] [ref=e190]
          - paragraph [ref=e191]:
            - strong [ref=e192]: Take action
            - text: "to reduce your exposure to polluted air using one or more of these strategies:"
          - list [ref=e193]:
            - listitem [ref=e194]: Stay indoors as much as possible with windows and doors closed until outdoor air quality is better.
            - listitem [ref=e195]: Use a portable air cleaner with a HEPA filter if you have access to one.
            - listitem [ref=e196]: Use a P2 or N95 mask.
            - listitem [ref=e197]: Go to a place with cleaner air – such as an air-conditioned building like a library or shopping centre – if it's safe to do so.
            - listitem [ref=e198]:
              - text: If you're concerned about symptoms, call Nurse-on-Call on
