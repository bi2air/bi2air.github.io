        - generic [ref=e69]:
          - paragraph [ref=e70]:
            - text: We monitor general (ambient), local and incident-related air quality around Victoria through
            - strong [ref=e71]: AirWatch
            - text: .
          - paragraph [ref=e72]: "AirWatch is our reporting tool that helps you stay informed about local air quality and how to protect your health. It provides:"
          - list [ref=e73]:
            - listitem [ref=e74]: hourly air quality data for different pollutants at each site, including any incident sites
            - listitem [ref=e75]: hourly air quality ratings for each site
            - listitem [ref=e76]: daily regional air quality forecasts.
          - paragraph [ref=e77]: AirWatch collects data 24/7 all year round, giving you real-time, up-to-date information across Victoria.
          - paragraph [ref=e78]: We use different types of monitoring equipment for different purposes. Some equipment is fixed and some is mobile.
          - paragraph [ref=e79]: "Data collected from our monitoring equipment supports our daily air quality forecasts. It also helps us provide air quality category advice for the community and people sensitive to air pollution. To understand how you can minimise your exposure to air pollution, learn how we:"
          - list [ref=e80]:
            - listitem [ref=e81]:
              - link "measure air pollution" [ref=e82] [cursor=pointer]:
                - /url: /how-we-measure-air-pollution
            - listitem [ref=e83]:
              - link "calculate air quality categories" [ref=e84] [cursor=pointer]:
                - /url: /air-quality-categories
            - listitem [ref=e85]:
              - link "forecast air quality" [ref=e86] [cursor=pointer]:
                - /url: /how-we-forecast-air-quality
              - text: .
          - paragraph [ref=e87]:
            - text: We meet all Australian Standards for air quality measurement and are
            - link:
              - /url: https://www.nata.com.au/entity_scope/?q1=c1o&str=&&AccNo=15119
            - text: accredited with the National Association of Testing Authorities (NATA). To learn more, visit
            - link "Air quality categories" [ref=e88] [cursor=pointer]:
              - /url: /air-quality-categories
            - text: .
          - paragraph [ref=e89]: "We're committed to reporting air quality information to the Victorian community. We report through:"
          - list [ref=e90]:
            - listitem [ref=e91]:
              - link "Check air and water quality map" [ref=e92] [cursor=pointer]:
                - /url: /check-air-and-water-quality
              - text: – updated hourly with data collected from our standard and sensor monitoring sites, and daily at 5 pm with forecasts for the next 24 hours
            - listitem [ref=e93]:
              - link "air alerts" [ref=e94] [cursor=pointer]:
                - /url: /air-alerts
              - text: for issues or incidents affecting air quality in a specific area or information we need to highlight
            - listitem [ref=e95]:
              - text: our
              - link "Facebook" [ref=e96] [cursor=pointer]:
                - /url: https://www.facebook.com/VicGovEPA
              - text: account
            - listitem [ref=e97]:
              - text: annual reporting on Victoria’s ambient air quality via
              - link "DataVic" [ref=e98] [cursor=pointer]:
                - /url: https://discover.data.vic.gov.au/dataset/epa-air-watch-all-sites-air-quality-hourly-averages-yearly
              - text: (hourly averages for all sites) and the
              - link "National Environment Protection Measures (NEPMs)" [ref=e99] [cursor=pointer]:
                - /url: https://www.nepc.gov.au/nepms
              - text: annual reporting.
          - paragraph [ref=e100]:
            - link "Contact us" [ref=e101] [cursor=pointer]:
              - /url: /contact-us
            - text: to request data not yet available on DataVic.
        - generic [ref=e103]:
          - heading "Standard monitoring sites" [level=2] [ref=e104]
          - paragraph [ref=e105]: We have air monitoring equipment at general and local condition sites. This equipment gives us information about ambient air quality and pollution. We've been monitoring general (ambient) air quality at some locations for more than 30 years.
          - heading "General condition sites" [level=3] [ref=e106]
          - paragraph [ref=e107]: These sites provide information on general air quality and pollution over a large area. They also measure over long time periods to help us understand long-term trends in air pollution. They give us the big picture about air quality.
          - paragraph [ref=e108]: These sites are strategically located around Victoria. We place them in population centres that represent the air quality experienced by most people.
          - paragraph [ref=e109]: Watch our video to learn what happens inside one of our general condition sites.
          - generic [ref=e110]:
            - figure [ref=e111]:
              - iframe [ref=e113]:
                - generic "YouTube Video Player" [ref=f44e3]
            - link "View transcript" [ref=e115] [cursor=pointer]:
              - /url: /media/1009108
              - text: View transcript
          - heading "Local condition sites" [level=3] [ref=e118]
          - paragraph [ref=e119]: These sites provide information on local air quality and pollution issues. We locate them temporarily in locations where we want to understand more about pollution in that area.
          - paragraph [ref=e120]: How long we operate each site depends on the specific concern.
        - generic [ref=e122]:
          - heading "Sensor air monitoring sites" [level=2] [ref=e123]
          - paragraph [ref=e124]:
            - text: We have particle sensors located in sites across regional Victoria. These sensors monitor and report levels of smoke (PM
            - subscript [ref=e125]: "2.5"
            - text: ) in these towns.
          - paragraph [ref=e126]: Particle sensors are small air monitoring equipment that measures airborne particles, such as smoke and dust.
          - paragraph [ref=e127]: "We use sensors to measure smoke and dust to supplement our general air monitoring network. Sensors help us to:"
          - list [ref=e128]:
            - listitem [ref=e129]: monitor in more locations
            - listitem [ref=e130]: identify potential local air pollution issues.
          - paragraph [ref=e131]: They give us a general indication of air quality. For example, a high reading from a sensor could indicate that the air is smoky.
          - paragraph [ref=e132]:
            - text: These sensors are less accurate than most other types of particle monitoring equipment. Learn more about
            - link "particle sensors" [ref=e133] [cursor=pointer]:
              - /url: /particle-sensors
            - text: .
        - generic [ref=e135]:
          - heading "Incident air monitoring sites" [level=2] [ref=e136]
          - paragraph [ref=e137]: Our portable incident air monitoring equipment is designed to respond rapidly to major and specific pollution events – for example, major fires and incidents. We use it when requested by emergency services.
          - paragraph [ref=e138]: This portable equipment can be quickly set up to give us local data about the impacts of a pollution event at a specific site. This helps us and other agencies make decisions about what to do next.
          - paragraph [ref=e139]: "An emergency incident can include:"
          - list [ref=e140]:
            - listitem [ref=e141]: community exposure to smoke from fires
            - listitem [ref=e142]: incidents involving hazardous materials
            - listitem [ref=e143]: planned burns.
          - paragraph [ref=e144]: We also partner with Victoria State Emergency Services (VICSES). Portable air monitoring equipment is stored at some VICSES depots for deployment by VICSES volunteers.
          - paragraph [ref=e145]:
            - text: We show data collected by some incident air monitoring equipment on the
            - link "Check air and water quality map" [ref=e146] [cursor=pointer]:
              - /url: /check-air-and-water-quality
            - text: .
          - paragraph [ref=e147]: "We do not always deploy incident monitoring equipment. For example, we may not do so when:"
          - list [ref=e148]:
            - listitem [ref=e149]: an incident is likely to be over quickly – for example, smoke from a fire lasting less than one day
            - listitem [ref=e150]: forecasting shows that air pollution is unlikely to impact population centres
            - listitem [ref=e151]: hazardous conditions mean that it’s not safe to deploy our equipment.
          - paragraph [ref=e152]:
            - text: For advice on health during a fire, visit
            - link "Smoke and your health" [ref=e153] [cursor=pointer]:
              - /url: /smoke-and-your-health
            - text: .
          - heading "Location of incident air monitoring sites" [level=3] [ref=e154]
          - paragraph [ref=e155]: Incident air monitoring sites are generally located near the community. This helps us understand the air quality where people are likely to be affected.
          - paragraph [ref=e156]: "Other factors that affect where we locate them include:"
          - list [ref=e157]:
            - listitem [ref=e158]: current and forecast wind direction
            - listitem [ref=e159]: weather
            - listitem [ref=e160]: topography
            - listitem [ref=e161]: expected duration of the event
            - listitem [ref=e162]: safety of staff setting up the equipment.
          - paragraph [ref=e163]: Our standard and incident air monitoring equipment is located at ground level. It only provides data on air quality at that level.
          - paragraph [ref=e164]: During a fire incident where smoke plumes rise straight up, there may be little or no impact on the air quality at ground level – for example, when a fire is burning at especially high temperatures.
          - paragraph [ref=e165]: In other weather conditions, when a layer of cool air is covered by warm air, smoke may become trapped and unable to rise. This can result in reduced air quality at ground level during fires.
          - heading "How long incident air monitoring takes" [level=3] [ref=e166]
          - paragraph [ref=e167]: From the time incident air monitoring is requested, it can take up to 24 hours for air quality data to be available. How long it takes also depends on the type of air monitoring equipment we deploy. This is because the time it takes to deploy different equipment can vary greatly.
          - paragraph
          - paragraph [ref=e168]:
            - img "A timeline graphic showing the steps from when an air quality incident begins through to how EPA responds and supports emergency services." [ref=e169]
          - paragraph
          - paragraph [ref=e170]: "The time from when we get the call to when the monitors have collected at least 45 minutes of data is 24 hours or less. When the incident begins, and we get the call we:"
          - list [ref=e171]:
            - listitem [ref=e172]: assess the monitoring sites
            - listitem [ref=e173]: collect IAM equipment
            - listitem [ref=e174]: travel to monitoring sites and set up equipment.
          - paragraph [ref=e175]: When the monitors have collected at least 45 minutes of data we publish this data on our website. We will continue to monitor air quality until pollution levels drop.
          - paragraph [ref=e176]: Our air monitoring equipment is set up to calculate average pollution levels over a one-hour period and a 24-hour period. This is so we can compare the data with relevant air quality standards.
          - heading "Moving equipment if the wind changes" [level=3] [ref=e177]
          - paragraph [ref=e178]:
            - text: We generally do not move or relocate sites during an emergency event. This is because cautionary health advice is based on collecting 24 hours of PM
            - subscript [ref=e179]: "2.5"
            - text: data. We need a minimum of 18 hours to start calculating a 24-hour rolling average number that can be translated into health advice.
          - paragraph [ref=e180]: Where there's a significant shift in wind direction, which may carry smoke towards another area, we may deploy more equipment.
        - paragraph [ref=e181]:
          - text: Updated
          - time [ref=e182]: 18 December 2025
