        - 'heading "JRAero: the Japanese Reanalysis for Aerosol v1.0" [level=1] [ref=e105]'
        - generic [ref=e106]:
          - generic [ref=e107]:
            - generic [ref=e108]:
              - text: Keiya Yumimoto
              - link "" [ref=e109] [cursor=pointer]:
                - /url: mailto:yumimoto@riam.kyushu-u.ac.jp
                - generic [ref=e110]: 
            - text: ","
          - generic [ref=e111]: Taichu Y. Tanaka,
          - generic [ref=e112]: Naga Oshima,
          - generic [ref=e113]: and Takashi Maki
        - text: 
        - paragraph [ref=e115]:
          - strong [ref=e116]: Abstract.
          - text: A global aerosol reanalysis product named the Japanese Reanalysis for Aerosol (JRAero) was constructed by the Meteorological Research Institute (MRI) of the Japan Meteorological Agency. The reanalysis employs a global aerosol transport model developed by MRI and a two-dimensional variational data assimilation method. It assimilates maps of aerosol optical depth (AOD) from MODIS onboard the Terra and Aqua satellites every 6 h and has a TL159 horizontal resolution (approximately 1.1° × 1.1°). This paper describes the aerosol transport model, the data assimilation system, the observation data, and the setup of the reanalysis and examines its quality with AOD observations.
          - text: Comparisons with MODIS AODs that were used for the assimilation showed that the reanalysis showed much better agreement than the free run (without assimilation) of the aerosol model and improved under- and overestimation in the free run, thus confirming the accuracy of the data assimilation system. The reanalysis had a root mean square error (RMSE) of 0.05, a correlation coefficient (R) of 0.96, a mean fractional error (MFE) of 23.7 %, a mean fractional bias (MFB) of 2.8 %, and an index of agreement (IOA) of 0.98. The better agreement of the first guess, compared to the free run, indicates that aerosol fields obtained by the reanalysis can improve short-term forecasts.
          - text: AOD fields from the reanalysis also agreed well with monthly averaged global AODs obtained by the Aerosol Robotic Network (AERONET) (RMSE = 0.08, R = 0. 90, MFE = 28.1 %, MFB = 0.6 %, and IOA = 0.93). Site-by-site comparison showed that the reanalysis was considerably better than the free run; RMSE was less than 0.10 at 86.4 % of the 181 AERONET sites, R was greater than 0.90 at 40.7 % of the sites, and IOA was greater than 0.90 at 43.4 % of the sites. However, the reanalysis tended to have a negative bias at urban sites (in particular, megacities in industrializing countries) and a positive bias at mountain sites, possibly because of insufficient anthropogenic emissions data, the coarse model resolution, and the difference in representativeness between satellite and ground-based observations.
