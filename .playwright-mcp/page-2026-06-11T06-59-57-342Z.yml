          - heading "Variation to the Ambient Air Quality NEPM – particles standards" [level=1] [ref=e75]
          - generic [ref=e77]:
            - generic [ref=e78]: "2015"
            - generic [ref=e79]:
              - paragraph [ref=e80]:
                - text: At its meeting on 15 December 2015, the National Environment Protection Council (NEPC) agreed to vary the AAQ NEPM by approving an amending instrument to the AAQ NEPM. The amending instrument took effect on 4 February 2016, the day after it was registered on the Federal Register of Legislative Instruments (FRLI). In approving the amendments, the NEPC took into account the
                - emphasis [ref=e81]: Impact Statement
                - text: and information received during public consultation on this proposed variation. NEPC’s responses to the feedback received are available in the
                - emphasis [ref=e82]: Summary of Submissions
                - text: document.
              - list [ref=e83]:
                - listitem [ref=e84]:
                  - link "Public consultation on proposed variation" [ref=e85] [cursor=pointer]:
                    - /url: /nepms/ambient-air-quality/proposed-variation/consultation#Impact_Statement_and_draft_varied_measure
                  - text: "- summary of submissions"
              - paragraph [ref=e86]: "The amendment, taking into account the latest scientific evidence about the health impacts of particles, includes:"
              - list [ref=e87]:
                - listitem [ref=e88]:
                  - text: Amending the status of the annual average and 24-hour average PM
                  - subscript [ref=e89]: "2.5"
                  - text: ‘advisory reporting standards’ to ‘standards’
                - listitem [ref=e90]:
                  - text: Including an annual average PM
                  - subscript [ref=e91]: "10"
                  - text: standard of 25 μg/m
                  - superscript [ref=e92]: "3"
                - listitem [ref=e93]:
                  - text: Including an aim to move to annual average and 24-hour PM
                  - subscript [ref=e94]: "2.5"
                  - text: standards of 7 μg/m
                  - superscript [ref=e95]: "3"
                  - text: and 20 μg/m
                  - superscript [ref=e96]: "3"
                  - text: by 2025
                - listitem [ref=e97]:
                  - text: Initiating a nationally consistent approach to reporting population exposure to PM
                  - subscript [ref=e98]: "2.5"
                - listitem [ref=e99]:
                  - text: Replacing the five-day exceedance form of the 24-hour PM
                  - subscript [ref=e100]: "2.5"
                  - text: and PM
                  - subscript [ref=e101]: "10"
                  - text: standards with an exceptional event rule.
              - heading "Ambient Air Quality NEPM – FRLI" [level=2] [ref=e102]
              - paragraph [ref=e103]: For further information regarding the amending instrument, including explanatory statement, visit
              - list [ref=e104]:
                - listitem [ref=e105]:
                  - link "Variation to the National Environment Protection (Ambient Air Quality) Measure 2015 " [ref=e106] [cursor=pointer]:
