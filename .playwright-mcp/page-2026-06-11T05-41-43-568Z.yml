            - link "Report illegal waste dumping" [ref=e89]:
              - /url: /report-illegal-waste-dumping
          - paragraph [ref=e91]: We take action on every report of illegally dumped waste. Illegal dumping pollutes our environment and impacts our health. If you see what you think is dumped waste or rubbish, you can report it to us.
        - generic [ref=e95] [cursor=pointer]:
          - heading "Report littering from a vehicle" [level=3] [ref=e96]:
            - link "Report littering from a vehicle" [ref=e97]:
              - /url: /report-littering-vehicle
          - paragraph [ref=e99]: It’s against the law to litter from a vehicle, including a car, truck or van. If you see someone littering from or near the vehicle they are using, you can report it to us. Your report helps us prevent pollution in Victoria.
        - generic [ref=e103] [cursor=pointer]:
