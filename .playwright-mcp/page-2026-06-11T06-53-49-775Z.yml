            - generic [ref=e126]:
              - text: "Last updated:"
              - time [ref=e128]: 03 June 2026
            - article [ref=e130]:
              - generic [ref=e132]:
                - paragraph [ref=e133]: The air we breathe affects our health, our quality of life and our environment. Air pollution can cause heart and lung disease, cancer and other health problems.
                - paragraph [ref=e134]: For some pollutants, no level of exposure is safe.
                - paragraph [ref=e135]: Children, pregnant women and older people are especially vulnerable to air pollution. First Nations people and those with health conditions are also at greater risk.
                - heading "Tracking Australia's air quality" [level=2] [ref=e136]
                - paragraph [ref=e137]:
                  - text: The
                  - link "State of the Environment Report 2021 (external link) ’ŹØ" [ref=e138] [cursor=pointer]:
                    - /url: https://soe.dcceew.gov.au/
                    - text: State of the Environment Report 2021
                    - generic [ref=e139]: (external link)
                    - text: ’ŹØ
                  - text: found Australia has good air quality in general, but there is still work to do.
                - paragraph [ref=e140]: Climate change will increase pressure on air quality. Bushfires expose large areas of Australia to dangerous levels of smoke. This can have a significant short-term impact on the air we breathe. A warming climate will also lead to increased smog in the summer, and drought will lead to dust storms.
                - paragraph [ref=e141]: Population growth is another challenge. As cities grow, they need more energy and transport. This can result in increased pollution if reliant on fossil fuels.
                - paragraph [ref=e142]: Industry can impact on local areas, leading to air quality concerns for residents. Wood heater smoke also causes localised pollution in built-up areas in winter.
                - heading "Managing air quality in Australia" [level=2] [ref=e143]
                - paragraph [ref=e144]: All levels of government play a role in managing AustraliaŌĆÖs air quality.
                - paragraph [ref=e145]: The Australian Government takes the lead on issues that need a national approach. This includes setting national standards and regulating imports of polluting products.
                - paragraph [ref=e146]: "The state and territories:"
                - list [ref=e147]:
                  - listitem [ref=e148]: are responsible for air quality in their jurisdictions
                  - listitem [ref=e149]: have laws and strategies in place to manage pollution
                  - listitem [ref=e150]: report against national ambient air quality standards that protect peopleŌĆÖs health.
                - paragraph [ref=e151]: "Local governments:"
                - list [ref=e152]:
                  - listitem [ref=e153]: respond to local air pollution issues like wood heater smoke
                  - listitem [ref=e154]: raise awareness about how household activities affect air quality.
                - heading "Our role" [level=2] [ref=e155]
                - list [ref=e156]:
                  - listitem [ref=e157]: We work with states and territories to maintain and improve Australia's air quality.
                  - listitem [ref=e158]: We administer legislation related to air quality management and reporting.
                  - listitem [ref=e159]: We support air quality research through the National Environment Science Program.
                  - listitem [ref=e160]: We provide policy advice on air quality to the Australian Government.
                - heading "Our legislation and obligations" [level=2] [ref=e161]
                - paragraph [ref=e162]: These include four National Environment Protection Measures (NEPMs) and the National Clean Air Agreement.
