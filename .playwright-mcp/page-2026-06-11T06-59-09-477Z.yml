              - generic [ref=e288]:
                - heading "How Kennaook / Cape Grim data is used" [level=2] [ref=e290]
                - generic [ref=e291]:
                  - paragraph [ref=e292]:
                    - text: Kennaook / Cape Grim data is freely available. It is widely used to quantify global, regional and Australian emissions of greenhouse gases. The data is available from the
                    - link "World Data Centres" [ref=e293] [cursor=pointer]:
                      - /url: https://community.wmo.int/activity-areas/gaw/research-infrastructure/world-data-centres
                    - text: .
                  - heading "Climate change research and assessments" [level=3] [ref=e294]
                  - paragraph [ref=e295]: "The data and related analyses have been used in hundreds of research papers on climate change and ozone depletion. The data have been cited in all United Nations:"
                  - list [ref=e296]:
                    - listitem [ref=e297]:
                      - text: Framework Convention on Climate Change
                      - link "Intergovernmental Panel on Climate Change Assessment Reports" [ref=e298] [cursor=pointer]:
                        - /url: https://www.ipcc.ch/reports/
                    - listitem [ref=e299]:
                      - text: Environment Programme and
                      - link "World Meteorological Organization Scientific Assessment of Ozone Depletion Reports" [ref=e300] [cursor=pointer]:
                        - /url: https://library.wmo.int/records/item/42105-scientific-assessment-of-ozone-depletion-2022-executive-summary?offset=3#:~:text=The%202022%20WMO%2F%20United%20Nations,to%20its%20preparation%20and%20review.
                      - text: .
                  - heading "Reporting for international obligations" [level=3] [ref=e301]
                  - paragraph [ref=e302]: "Kennaook / Cape Grim data is used in reporting Australia's status on various international obligations, such as the:"
                  - list [ref=e303]:
                    - listitem [ref=e304]: Vienna Convention for the Protection of the Ozone Layer (1985)
                    - listitem [ref=e305]: Montreal Protocol on Substances that Deplete the Ozone layer (1987) and later amendments
                    - listitem [ref=e306]: Kyoto Protocol (2005) and Paris Agreement (2016), both under the United Nations Framework Convention on Climate Change.
                  - paragraph [ref=e307]: This also includes verifying parts of Australia's National Greenhouse Gas Inventory. The inventory is how Australia reports its annual emissions to the United Nations Framework Convention on Climate Change.
                  - heading "Understanding national climate" [level=3] [ref=e308]
                  - paragraph [ref=e309]:
                    - text: Measurements from Kennaook / Cape Grim are also vital to the
                    - link "State of the Climate report" [ref=e310] [cursor=pointer]:
                      - /url: /weather-and-climate/past-weather-and-climate/state-of-the-climate-2024
                    - text: . We publish this report with the CSIRO every 2 years.
                  - paragraph [ref=e311]: "The data:"
                  - list [ref=e312]:
                    - listitem [ref=e313]: contributes to understanding of climate in Australia
                    - listitem [ref=e314]: includes new information about Australia’s climate of the past, present and future
                    - listitem [ref=e315]: informs a range of economic, environmental and social decision-making by governments, industries and communities.
