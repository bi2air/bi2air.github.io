                - heading "Understanding our atmosphere" [level=2] [ref=e106]
                - generic [ref=e107]:
                  - paragraph [ref=e108]: Earth's climate is changing due to changes in the composition of the atmosphere.
                  - paragraph [ref=e109]: At Kennaook / Cape Grim, the Bureau operates a scientific observatory to measure the composition of some of the world's cleanest air. The station is on Tasmania's west coast, near the north-west tip of the island.
                  - paragraph [ref=e110]: When conditions are right, the air at Kennaook / Cape Grim is representative of the well-mixed atmosphere, unaffected by local pollution.
                  - heading "What is measured" [level=3] [ref=e111]
                  - paragraph [ref=e112]: "At the station we measure atmospheric composition to chronicle how it has changed over time. This includes measuring:"
                  - list [ref=e113]:
                    - listitem [ref=e114]: greenhouse gases that drive climate change
                    - listitem [ref=e115]: substances that cause the hole in the ozone layer (stratospheric ozone depletion)
                    - listitem [ref=e116]: other features of the atmosphere that affect climate, directly or indirectly.
                  - heading "Why Kennaook / Cape Grim data is important" [level=3] [ref=e117]
                  - paragraph [ref=e118]: "Scientists use data from this station to:"
                  - list [ref=e119]:
                    - listitem [ref=e120]: understand the life cycle and impacts of various parts of the atmosphere, and how their influence changes over time
                    - listitem [ref=e121]: calculate emissions of harmful substances, nationally and globally.
                  - paragraph [ref=e122]:
                    - text: The station contributes to the Cape Grim Science Program, which we manage with
                    - link "CSIRO" [ref=e123] [cursor=pointer]:
                      - /url: https://www.csiro.au/en/
                    - text: .
