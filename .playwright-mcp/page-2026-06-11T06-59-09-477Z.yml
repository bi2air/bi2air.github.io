                    - img [ref=e194]
                    - generic [ref=e197]: World Data Centre
              - generic [ref=e201]:
                - heading "Monitoring ozone depleting substances" [level=3] [ref=e202]
                - paragraph [ref=e203]: Ozone in Earth's stratosphere protects our planet from some of the Sun's harshest radiation.
                - paragraph [ref=e204]: Ozone depleting substances are chemicals responsible for the ozone hole. They destroy ozone in the stratosphere. Many of these are also potent greenhouse gases.
                - paragraph [ref=e205]: Concerns about the impact of these chemicals led to the Vienna Convention for the Protection of the Ozone Layer in 1985. This was followed by the Montreal Protocol on Substances that Deplete Ozone in 1987. It sought to curb production and called for ongoing monitoring of these chemicals in the atmosphere.
                - paragraph [ref=e206]:
                  - text: At the station we routinely measure all of the significant ozone depleting substances. This is possible through a collaboration with the international
                  - link "Advanced Global Atmospheric Gases Experiment (AGAGE)" [ref=e207] [cursor=pointer]:
                    - /url: https://agage.mit.edu/stations/kennaookcape-grim
                  - text: network.
              - generic [ref=e211]:
                - heading "Other measurements at Kennaook / Cape Grim" [level=3] [ref=e212]
                - paragraph [ref=e213]: Measurements of greenhouse gases and ozone depleting substances are an important part of the work at Kennaook / Cape Grim, but there is much more.
                - paragraph [ref=e214]: "The composition of the Earth's atmosphere is changing in complex and subtle ways. These changes influence how the atmosphere and climate respond. For example:"
                - list [ref=e215]:
                  - listitem [ref=e216]:
                    - strong [ref=e217]: Atmospheric particles
                    - text: can influence how light from the sun passes through the atmosphere. Particles are also critical in cloud formation.
                  - listitem [ref=e218]:
                    - strong [ref=e219]: Reactive gases
                    - text: such as nitric oxides and ozone influence the chemistry of the atmosphere. They are also involved in particle formation.
                  - listitem [ref=e220]:
                    - strong [ref=e221]: Radon measurements
                    - text: tell us if the air we are measuring has recently been over land, so works as a tracer.
                - paragraph [ref=e222]: We take detailed and precise measurements of these and more. This enables us to chronicle the influence of all these factors and understand changes over time.
              - generic [ref=e225]:
                - generic:
                  - generic:
                    - generic:
                      - img "Aerial photo of Kennaook / Cape Grim station on the tip of a green but rocky cliff, above a turquoise and blue ocean."
                - paragraph [ref=e227]: Kennaook / Cape Grim Baseline Air Pollution Station is ideally located to sample clean air from across the Southern Ocean
              - generic [ref=e230]:
                - heading "Sample archives" [level=2] [ref=e232]
                - generic [ref=e233]:
                  - paragraph [ref=e234]:
                    - text: Collections for the
                    - link "Cape Grim Air Archive" [ref=e235] [cursor=pointer]:
                      - /url: https://research.csiro.au/acc/capabilities/cape-grim-air-archive/
                    - text: have been made since 1978. It is the world's longest, complete archive of such pristine samples.
                  - paragraph [ref=e236]: Using this archive, researchers can analyse samples as they were, as far back as 1978. They can use new techniques or look for recently-identified species in older samples. Samples are collected several times a year.
                  - paragraph [ref=e237]:
                    - text: Particle samples from baseline air have been collected since 1985. The samples are collected with a high volume sampler through a PM
                    - subscript [ref=e238]: "10"
                    - text: size-selective inlet. They are captured on a filter and analysed at CSIRO.
                  - paragraph [ref=e239]: CSIRO manages the curated collections, used by researchers around the world.
              - generic [ref=e242]:
                - heading "Australian and international partners" [level=2] [ref=e244]
                - generic [ref=e245]:
                  - heading "Australian partners" [level=3] [ref=e246]
                  - heading "CSIRO" [level=4] [ref=e247]
                  - paragraph [ref=e248]:
                    - text: With
                    - link "CSIRO" [ref=e249] [cursor=pointer]:
                      - /url: https://www.csiro.au/en/
                    - text: ", we manage the Cape Grim Science Program:"
                  - list [ref=e250]:
                    - listitem [ref=e251]: The Bureau funds and operates the baseline air pollution station. We're responsible for chronicling how baseline atmospheric composition changes over time.
                    - listitem [ref=e252]: CSIRO invests in staff who provide expertise in the measurement process. This collaboration enables CSIRO to progress scientific understanding of climate change drivers.
                  - heading "Australian Nuclear Science and Technology Organisation" [level=4] [ref=e253]
                  - paragraph [ref=e254]:
                    - text: The
                    - link "Australian Nuclear Science and Technology Organisation" [ref=e255] [cursor=pointer]:
                      - /url: https://www.ansto.gov.au/
                    - text: has expertise in radioactive substances. Their work at this station focuses on radon gas.
                  - paragraph [ref=e256]: Radon occurs naturally in the atmosphere after being mainly emitted from land, and is short-lived.
                  - paragraph [ref=e257]: Radon measurements help us understand whether the air we're measuring has recently been over land and whether it may have been recently polluted by urban activity.
                  - heading "University of Wollongong and University of Southern Queensland" [level=4] [ref=e258]
                  - paragraph [ref=e259]:
                    - text: The
                    - link "University of Wollongong" [ref=e260] [cursor=pointer]:
