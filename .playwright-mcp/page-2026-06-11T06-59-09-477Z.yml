              - generic [ref=e141]:
                - heading "Clean air from across the Southern Ocean" [level=3] [ref=e142]
                - paragraph [ref=e143]: Westerly to south-westerly winds blow across the Southern Ocean. They deliver pristine air to the station's precise monitoring equipment.
                - paragraph [ref=e144]: This air is representative of the well-mixed atmosphere of the southern hemisphere. Unpolluted by local sources, it's called 'baseline air'.
                - paragraph [ref=e145]: Some measurements are made in non-baseline conditions. These give insight into the processes of the atmosphere. The data also helps refine Australian emissions estimates, for example, greenhouse gases.
                - heading "Global significance" [level=3] [ref=e146]
                - paragraph [ref=e147]: Several sites around the world measure elements of atmospheric composition. Few of these, and none in the southern hemisphere, do this as comprehensively as at Kennaook / Cape Grim.
                - paragraph [ref=e148]:
                  - text: This station and the related science program are guided by the
                  - link "World Meteorological Organization's Global Atmosphere Watch Programme" [ref=e149] [cursor=pointer]:
                    - /url: https://wmo.int/activities/global-atmosphere-watch-programme-gaw#:~:text=Global%20Atmosphere%20Watch%20(GAW)%20Programme,%2C%20weather%2C%20and%20air%20pollution.
                  - text: . Kennaook / Cape Grim data is stored in the World Data Centres coordinated by the program.
                - heading "Updates on station activities and more" [level=3] [ref=e150]
                - paragraph [ref=e151]:
                  - text: We report the station's activities, data and research results in
                  - link "Baseline" [ref=e152] [cursor=pointer]:
                    - /url: https://nla.gov.au/nla.obj-1908472465?searchTerm=Baseline%20Air%20Pollution%20Station%20Cape%20Grim
                  - text: . You'll find this publication on Trove, an archive service managed by the National Library of Australia.
              - generic [ref=e155]:
                - heading "Measurements at Kennaook / Cape Grim" [level=2] [ref=e157]
                - generic [ref=e158]:
                  - heading "Measuring greenhouse gases" [level=3] [ref=e159]
                  - paragraph [ref=e160]: Greenhouse gas measurements began at this station in 1976. It started with carbon dioxide and various halocarbons – potent synthetic greenhouse gases.
                  - paragraph [ref=e161]: Carbon dioxide at that time was recorded at 330 parts per million (ppm). Nearly half a century later, it has increased by about 25%.
                  - paragraph [ref=e162]: "The station now captures valuable data on more than 80 gases, for example:"
                  - list [ref=e163]:
                    - listitem [ref=e164]:
                      - text: carbon dioxide, CO
                      - subscript [ref=e165]: "2"
                    - listitem [ref=e166]:
                      - text: methane, CH
                      - subscript [ref=e167]: "4"
                    - listitem [ref=e168]:
                      - text: nitrous oxide, N
                      - subscript [ref=e169]: "2"
                      - text: O.
                  - paragraph [ref=e170]: "It also includes synthetic gases such as:"
                  - list [ref=e171]:
                    - listitem [ref=e172]: chlorofluorocarbons (CFCs)
                    - listitem [ref=e173]: hydrochlorofluorocarbons (HCFCs)
                    - listitem [ref=e174]: hydrofluorocarbons (HFCs)
                    - listitem [ref=e175]: perfluorocarbons (PFCs)
                    - listitem [ref=e176]:
                      - text: sulphur hexafluoride (SF
                      - subscript [ref=e177]: "6"
                      - text: ).
              - generic [ref=e180]:
                - heading "Greenhouse gas data from Kennaook / Cape Grim" [level=2] [ref=e181]
                - generic [ref=e184]: Some greenhouse gas data from the station is available from the CSIRO. For comprehensive data, visit the World Data Centre for Greenhouse Gases.
                - generic [ref=e185]:
                  - link "CSIRO – Kennaook / Cape Grim" [ref=e186] [cursor=pointer]:
