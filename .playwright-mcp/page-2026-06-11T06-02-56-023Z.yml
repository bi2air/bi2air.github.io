  - generic [ref=e28]:
    - heading "About SPRINTARS" [level=2] [ref=e29]
    - paragraph [ref=e30]: SPRINTARS (Spectral Radiation-Transport Model for Aerosol Species) is a numerical model which has been developed for simulating effects on the climate system and condition of atmospheric pollution by atmospheric aerosols on the global scale.
    - paragraph [ref=e31]:
      - text: SPRINTARS has been primarily developed by
      - link "Climate Change Science Section, Research Institute for Applied Mechanics, Kyushu University" [ref=e32] [cursor=pointer]:
        - /url: https://www.riam.kyushu-u.ac.jp/climate/index.html
      - text: . SPRINTARS treats main tropospheric aerosols both from natural and anthropogenic sources (black carbon, organic matter, sulfate, soil dust, and sea salt). They are also categorized into SPM, PM10 and PM2.5. SPRINTARS calculates transport processes of aerosols (emission, advection, diffusion, wet deposition, dry deposition, and gravitational settling). The aerosol-radiation interaction, which is scattering and absorption of solar and thermal radiation by aerosols, and the aerosol-cloud interaction, which is act of aerosols as cloud condensation nuclei and ice nuclei, are included in the calculation. SPRINTARS is based on an atmosphere-ocean general circulation model, MIROC, developed by
      - link "Atmosphere and Ocean Research Institute (AORI), University of Tokyo" [ref=e33] [cursor=pointer]:
        - /url: https://www.aori.u-tokyo.ac.jp/english/
      - text: ","
      - link "National Institute for Environmental Studies" [ref=e34] [cursor=pointer]:
        - /url: http://www.nies.go.jp/index-e.html
      - text: ", and"
      - link "Japan Agency for Marine-Earth Science and Technology (JAMSTEC)" [ref=e35] [cursor=pointer]:
        - /url: http://www.jamstec.go.jp/e/
      - text: ", and it is also incorporated into a global cloud resolving model,"
      - link "NICAM" [ref=e36] [cursor=pointer]:
        - /url: http://nicam.jp
      - text: .
    - heading "Present specifications of SPRINTARS" [level=3] [ref=e37]
    - list [ref=e38]:
      - listitem [ref=e39]: SPRINTARS version 6.1.0 (for research) / 3.84 (for forecast and archive)
      - listitem [ref=e40]: "horizontal resolution: T319 (0.375 degrees longitude/latitude) or T213 (0.5625 degrees longitude/latitude) or T106 (1.125 degrees longitude/latitude) or T85 (1.40625 degrees longitude/latitude) or T42 (2.8125 degrees longitude/latitude)"
      - listitem [ref=e41]: "vertical resolution: 56 or 20 layers (sigma coordinate) / 40 layers (hybrid coordinate)"
