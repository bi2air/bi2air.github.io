          - text: .
        - heading "Water quality alerts" [level=3] [ref=e180]
        - paragraph [ref=e181]: Water quality alerts are based on pollution reports or other notifications received by us. They are an indication of the location of potential pollution or other activities that may impact water quality. Pollution or other impacts can also move with time. We remove alerts based on EPA or other updates, or if no other pollution reports are received for a waterbody.
      - generic [ref=e183]:
        - heading "Incidents" [level=2] [ref=e184]
        - paragraph [ref=e185]:
          - text: Our
          - link "incident air monitoring equipment" [ref=e186] [cursor=pointer]:
            - /url: /how-we-monitor-air-quality
          - text: responds rapidly to an incident, such as a major fire. We use it when requested by emergency services.
        - paragraph [ref=e187]:
          - text: We provide technical support during an incident. For example, air or water sampling and monitoring, and advice on the environmental impacts and health risks of pollution and waste. Learn more about our
