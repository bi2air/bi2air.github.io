            - link "Current incidents" [ref=e191] [cursor=pointer]:
              - /url: /current-incidents
        - heading "Incident air quality data" [level=3] [ref=e192]
        - paragraph [ref=e193]: Our portable incident air monitoring equipment gives us local data about the impacts of a pollution event at a specific site. We also have incident air monitoring sites located near the community.
        - paragraph [ref=e194]: Our standard and incident air monitoring equipment is located at ground level. It only provides data on air quality at that level.
        - paragraph [ref=e195]: There are circumstances where we do not deploy incident monitoring equipment. For example, if an incident is likely to be over quickly, or it’s not safe due to conditions.
