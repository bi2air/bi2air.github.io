      - generic [ref=e150]:
        - heading "Disclaimer - Air quality data" [level=3] [ref=e151]
        - paragraph [ref=e152]: Air quality data comes directly from our air monitoring sites using various types of monitoring equipment and methods. This data may be adjusted later according to set criteria to account for monitoring equipment errors, power interruptions and other technical issues.
        - paragraph [ref=e153]: We aim to locate our monitoring sites, so they represent the air quality experienced by the public. As most of the Victorian population lives and works close to roads, most of our sites are in population centres next to roads.
        - paragraph [ref=e154]:
          - text: Locating our monitoring sites close to roads can also mean we do not always comply with one of the requirements of the Australian Standard for sitting (AS 3580.1.1:2016). This standard specifies that air monitoring sites should be more than 50m away from a road. Learn more about our
          - link "National Association of Testing Authorities (NATA) accreditation." [ref=e155] [cursor=pointer]:
            - /url: /node/43301#air-quality-standards-and-accreditation
      - generic [ref=e157]:
        - heading "When map data is updated" [level=2] [ref=e158]
        - heading "Incidents" [level=3] [ref=e159]
        - paragraph [ref=e160]: From the time incident air monitoring is requested, it can take up to 24 hours for air quality data to be available.
        - paragraph [ref=e161]: Impacts to waterbodies will receive a water quality alert.
        - heading "Air quality" [level=3] [ref=e162]
        - paragraph [ref=e163]: Current air quality is updated hourly with data collected from our air quality monitoring sites across Victoria. Air quality forecasts are updated daily at 5 pm with forecasts for the next 24 hours.
        - paragraph [ref=e164]: Sometimes we cannot show data for a monitoring site. This could be because we're doing maintenance work, equipment is not working, or there's an issue with this website.
        - paragraph [ref=e165]: Check the air monitoring network status above to see air monitoring equipment that's offline.
        - paragraph [ref=e166]:
          - text: Historical hourly air quality data from our sites measuring against the National Environment Protection Measures is available on
          - link "data.vic.gov.au" [ref=e167] [cursor=pointer]:
            - /url: https://www.data.vic.gov.au/
          - text: . For any other site data contact 1300 372 842.
        - heading "Water quality at Port Phillip Bay beaches and Yarra" [level=3] [ref=e168]
        - paragraph [ref=e169]: "We provide water quality forecasts twice a day:"
        - list [ref=e170]:
          - listitem [ref=e171]: at 10 am for the morning forecast
          - listitem [ref=e172]: at 3 pm for the afternoon and next day forecast.
        - paragraph [ref=e173]:
          - text: You can see water quality forecasts on the map, our Facebook account
          - link "@VicGovEPA (opens in a new window)" [ref=e174] [cursor=pointer]:
            - /url: https://www.facebook.com/VicGovEPA/
            - text: "@VicGovEPA"
            - generic: (opens in a new window)
          - text: and signs at patrolled lifesaving clubs on weekends and public holidays between November and April. Learn
          - link "how we forecast water quality" [ref=e175] [cursor=pointer]:
            - /url: /water-quality-forecast-ratings
          - text: .
