    - generic [ref=e136]:
      - generic [ref=e137]:
        - generic [ref=e138]:
          - generic [ref=e139]: Abstract
          - generic [ref=e140]:
            - text: Observations show that optical depth over desert increase during daytime when a convective mixed layer develops under a light general wind condition. This implies that dust suspension by horizontal winds associated with convective motions occur even in the absence of general winds. In the present paper, a large eddy simulation is performed to study how much dust is suspended in a convective mixed layer without a general wind. The results show that dust particle concentration in the convective mixed layer can reach on the order of 10 μg m
            - superscript [ref=e141]: "-3"
            - text: ", which is in reasonable agreement with observations. Tiny dust particles that have small terminal velocities are easily brought up by convective winds during daytime and remain in the atmosphere throughout night. If a similar weather continues for several days, dust particles concentration on the evening of the second day can reach 1.8 times as large as that on the evening of the first day, accordingly."
