      - article [ref=e81]:
        - heading "Study of air pollution using high-resolution global cloud-resolving model" [level=1] [ref=e86]
        - generic [ref=e87]:
          - heading "Principal Investigator (Contact person)" [level=2] [ref=e89]
          - generic [ref=e94]: Daisuke GOTO (goto.daisuke[at]nies.go.jp) "[at] is replaced by @"
        - tablist "コンテンツ切り替えタブ" [ref=e95]:
          - tab "Overall" [selected] [ref=e96] [cursor=pointer]
          - tab "Publications & Link" [ref=e97] [cursor=pointer]
        - generic [ref=e98]:
          - heading "Overall" [level=2] [ref=e100]
          - generic [ref=e102]:
            - article [ref=e103]:
              - heading "Abstract" [level=3] [ref=e105]
              - paragraph [ref=e108]: As part of the East Asian Environment Research Project, we developed an atmospheric air pollution model coupled with a global nonhydrostatic model (NICAM-Chem) with 10-km spatial resolution, in order to simulate better the air pollution over East Asia. To investigate the performance of the model in simulating one of the major air pollutants (i.e., aerosols) with such resolution, we first applied a stretched-grid system to NICAM-Chem to run as a regional aerosol-transport model. We executed the “Stretched-NICAM-Chem” for the target of Tokyo (Japan) with a maximum horizontal resolution of approximately 10 km. We obtained generally accurate fields of primary and secondary aerosols and of short-lived gases compared with in situ measurements and other aerosol-transport models. Secondly, we integrated NICAM-Chem on a global scale with 14-km resolution. The “Global-NICAM-Chem” simulation of aerosol optical depth was generally close to that derived from satellite. These results will be useful for further investigations of aerosol-cloud interactions and detailed estimations of the effects on human health.
            - article [ref=e109]:
              - heading "Introduction and Methodology" [level=3] [ref=e111]
              - paragraph [ref=e114]: Air pollution over East Asia affects climate change and human health on both global and regional scales. Therefore, it is important to understand its distribution on the global scale with high accuracy. High-resolution horizontal simulations are important in properly simulating air pollution, because air pollutants and their precursors are emitted from localized hot spots in industrial or urbanized areas. Within this context, we developed an atmospheric air pollution model coupled with a global nonhydrostatic model (NICAM-Chem; Goto et al. 2015). The dynamic NICAM (Tomita and Satoh 2004; Satoh et al. 2008, 2014), which originally had a uniform grid system on a global scale, can concentrate horizontal grid points in regions of interest using a Schmidt transformation scheme or a stretched-grid system as a regional model (Tomita 2008). The use of the stretched-grid system greatly assists with the investigation of the performance of models with high horizontal resolution without the requirement for considerable computer resources. In this study, we used NICAM-Chem with both uniform and stretched-grid systems to obtain better distributions of air pollution under such high horizontal resolutions. The NICAM-Chem includes an aerosol module, which is based on SPRINTARS (Takemura et al. 2005). In this study, we integrated NICAM-Chem with the stretched-grid system (Stretched-NICAM-Chem) with 10-km horizontal resolution and applied it to the region around Tokyo (Japan). The results of the meteorological and aerosol fields simulated by Stretched-NICAM-Chem were evaluated using those obtained by in situ measurements around Tokyo, as well as throughout Japan. Based on the results obtained by Stretched-NICAM-Chem, we executed NICAM-Chem with the uniform grid system (Global-NICAM-Chem) with 14-km horizontal resolution. To evaluate the results, the aerosol optical depth (AOD) obtained by Global-NICAM-Chem was compared with that retrieved from the MODIS satellite on a global scale.
            - article [ref=e115]:
              - heading "Results and Summary" [level=3] [ref=e117]
              - generic [ref=e119]:
                - generic [ref=e120]: The Stretched-NICAM-Chem successfully simulated wind patterns and diurnal variations in the Kanto area, although it was inadequate in simulating the meteorological fields at the edge of the Kanto area, probably because the horizontal resolution was insufficient to reflect the mountainous terrain of this area. We obtained relatively accurate fields of primary (i.e., elemental carbon) and secondary aerosols (i.e., sulfate), and short-lived gases (e.g., SO2) compared with those obtained by measurements and other aerosol-transport models. The AOD simulated by the Global-NICAM-Chem was compared with the MODIS-retrieved AOD and the simulated results were found to be in general agreement with those obtained by MODIS. This was particularly so in terms of the global distribution, such as the outflow of mixed dust and anthropogenic compounds from East Asia to the North Pacific Ocean and the biomass burning from Central Africa to the Central Atlantic Ocean. Although some discrepancies in AOD between NICAM and MODIS were found in some areas, the results simulated by NICAM-Chem were adequately acceptable for our current levels of modeling of air pollution. We found that NICAM-Chem can be applicable to global and regional simulations of aerosols and thus, our developed technique using NICAM-Chem will be useful for further investigations of aerosol-cloud interactions and detailed estimations of the effects on human health.
                - paragraph [ref=e121]
