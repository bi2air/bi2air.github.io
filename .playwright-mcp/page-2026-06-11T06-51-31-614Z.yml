        - listitem [ref=e62]: Clearing the haze around air quality monitoring in Queensland
    - heading "Clearing the haze around air quality monitoring in Queensland" [level=1] [ref=e64]:
      - generic [ref=e65]: Clearing the haze around air quality monitoring in Queensland
    - img "A close-up of a dandelion with delicate white seeds being carried away by the wind against a soft blue sky. The sunlight glows through the dandelion head, creating a warm and dreamy atmosphere." [ref=e67]
  - main [ref=e71]:
    - contentinfo [ref=e72]:
      - paragraph [ref=e73]: "Issued: 15 April 2025"
      - paragraph [ref=e75]: 6 mins read
    - paragraph [ref=e77]: The air we breathe is vital to our health, wellbeing, and environment – but who is making sure Queensland’s air is ‘quality’ and how do they do it?
    - paragraph [ref=e78]: It’s a complex balance of living in a modern world with many emission sources and regulating what we do to ensure a healthy environment.
    - paragraph [ref=e79]: This blog is here to answer your common questions about air quality in Queensland, from the science behind air quality monitoring to the regulations that help reduce pollution.
    - heading "What is air quality?" [level=2] [ref=e80]
    - paragraph [ref=e81]:
      - link "Air quality (external link)" [ref=e82] [cursor=pointer]:
        - /url: https://www.dcceew.gov.au/environment/protection/air-quality
        - text: Air quality
        - generic [ref=e85]: (external link)
      - text: "refers to the condition of the air. ‘Good’ and ‘poor’ air quality (and everything in between) is generally influenced by two key factors:"
    - list [ref=e86]:
      - listitem [ref=e87]:
        - link "Pollutants (external link)" [ref=e88] [cursor=pointer]:
          - /url: https://www.dcceew.gov.au/environment/protection/air-quality/air-pollutants
          - text: Pollutants
          - generic [ref=e91]: (external link)
        - text: from people and our activities.
      - listitem [ref=e92]: Naturally occurring factors like bushfires or dust storms.
    - paragraph [ref=e93]: Generally, good air quality is characterised by low levels of pollutants (such as various chemicals, gases, or particles), and poor air quality contains higher concentrations that can be harmful to our health or the environment.
    - heading "Air pollutants" [level=2] [ref=e94]
    - paragraph [ref=e95]: We measure air quality by monitoring air pollutant levels and weather conditions. This information helps identify potential risks to human health or the environment.
    - paragraph [ref=e96]: Generally, air pollutants can be a result of combustion or non-combustion sources.
    - paragraph [ref=e97]: Combustion sources involve some type of ignition, and often include processes like fire, engines, power stations, or wood heaters. Even firing up a barbecue or starting a mower at home is a combustion process that can impact air quality.
    - paragraph [ref=e98]: Non-combustion activities don’t involve ignition, and are often from physical processes such as earthworks, bulk material handling, or events such as windblown dust.
    - paragraph [ref=e99]: "Some important pollutants we monitor include:"
    - heading "Particulate matter" [level=3] [ref=e100]
    - figure [ref=e101]
    - paragraph [ref=e102]: Particulate matter is a mixture of solid and liquid particles that are suspended in the air. At elevated levels, they can be hazardous to human health or cause nuisance. Particulate matter measurement is the concentration of particles in the air, regardless of the composition of the particle.
    - paragraph [ref=e103]:
      - text: "This matter is usually grouped into two size distributions: PM"
      - subscript [ref=e104]: "2.5"
      - text: (particles less than 2.5 micrometres in diameter) and PM
      - subscript [ref=e105]: "10"
      - text: (particles less than 10 micrometres in diameter). These particles can come from combustion or non-combustion processes.
    - heading "Ozone" [level=3] [ref=e106]
    - figure [ref=e107]
    - generic [ref=e108]:
      - paragraph [ref=e109]: Ozone is a colourless, highly reactive gas that can be produced at ground level by chemical reactions between oxides of nitrogen and volatile organic compounds in the presence of sunlight. It’s the main pollutant in ‘photochemical smog’. Combustion processes (including motor vehicle engines, power stations or bushfires) are the major sources of nitrogen oxides and VOCs.
      - heading "Carbon monoxide" [level=3] [ref=e110]
    - figure [ref=e111]
    - paragraph [ref=e112]: Carbon monoxide is a colourless and odourless gas that’s formed when substances containing carbon (such as petrol, gas, coal, and wood) are burned with an insufficient supply of air. Motor vehicles are the main source of carbon monoxide pollution in urban areas – and it’s also found in cigarette smoke.
    - heading "Nitrogen oxides" [level=3] [ref=e113]
    - figure [ref=e114]
    - paragraph [ref=e115]: This refers to gases (namely nitric oxide and nitrogen dioxide) that are produced from natural sources, motor vehicles, and other fuel-burning processes.
    - heading "Hydrogen sulfide" [level=3] [ref=e116]
    - figure [ref=e117]
    - paragraph [ref=e118]: If you’ve ever smelt hydrogen sulfide, you’re sure to remember it – it's a stinky, colourless gas that often gets compared to rotten eggs. It can be produced by decomposing organic material (like composting), sewage treatment, agricultural activities, or from the natural environment.
    - heading "Sulfur dioxide" [level=3] [ref=e119]
    - figure [ref=e120]
    - paragraph [ref=e121]: This is a colourless gas with a sharp, irritating odour at high concentrations. It is produced by burning fossil fuels and smelting of mineral ores that contain sulfur.
    - heading "Air toxics" [level=3] [ref=e123]
    - figure [ref=e124]
    - generic [ref=e126]:
      - paragraph [ref=e127]:
        - text: Like the name suggests, air toxics are gases, particles, or aerosols that are present in the air where they pose a hazard to human health or the environment. This group may include
        - link "volatile organic compounds (VOCs) (external link)" [ref=e128] [cursor=pointer]:
          - /url: https://www.dcceew.gov.au/environment/protection/npi/substances/fact-sheets/npi-definition-volatile-organic-compounds
          - text: volatile organic compounds (VOCs)
          - generic [ref=e131]: (external link)
        - text: ", with the most common being benzene, toluene, xylenes, formaldehyde, and polycyclic aromatic hydrocarbons. These may come from combustion or non-combustion activities."
      - heading "Metals" [level=3] [ref=e132]
    - figure [ref=e133]
    - paragraph [ref=e134]: Metals may occur as vapours or particles in the air – this is usually a result of mining, metal casting, or industrial processes that contribute to metal emissions. These may include metals such as lead, arsenic, cadmium, zinc, or nickel.
    - heading "Air quality monitoring" [level=2] [ref=e135]
    - figure "Queensland’s air monitoring stations play a crucial role in tracking air quality and ensuring a healthier environment for communities." [ref=e136]:
      - img "A fenced-off air monitoring station in a grassy area, with a sign from the Queensland Government stating," [ref=e137]
      - paragraph [ref=e139]: Queensland’s air monitoring stations play a crucial role in tracking air quality and ensuring a healthier environment for communities.
    - paragraph [ref=e140]: As Queensland’s environmental regulator, we monitor the quality of the air in the environment using a statewide network of air and weather monitoring stations. They gather data 24 hours a day, seven days a week.
    - paragraph [ref=e141]: These stations collect important air quality parameters such as pollutant and particulate matter concentrations, as well as meteorological parameters that may impact air quality such as humidity, rainfall, temperature, plus wind direction and speed. This data is then validated and analysed by air quality scientists that look at air quality trends and compare measured data against air quality standards.
    - paragraph [ref=e142]:
      - link "National air quality standards (external link)" [ref=e143] [cursor=pointer]:
        - /url: https://www.nepc.gov.au/nepms/ambient-air-quality
        - text: National air quality standards
        - generic [ref=e146]: (external link)
      - text: set strict guidelines about acceptable levels of air pollutants in Queensland to safeguard human health and the natural environment. These standards are benchmarks that help manage short- or long-term air quality issues at a local, regional, or national level, and help us to identify when levels may be unsafe, or cause issues for the community.
    - paragraph [ref=e147]: In Queensland, the National Environment Protection (Ambient Air Quality) Measure for is used for health-base standards to identify risks to human health. We also use the Environment Protection Quality (Air) which sets objectives for safeguarding environmental values.
    - paragraph [ref=e148]: In many cases, the standards we use vary for pollutants, and may use a specific threshold or time-weighted average (e.g. an average over a 24-hour period). Standards need to consider different exposures that may result in different health effects – for example short-term (acute) or long-term (chronic) effects.
    - paragraph [ref=e149]: Standards may also account for the effects of pollutants at different levels. At low levels some pollutants may cause odours or irritation, while higher levels (or over a longer period) may impact health.
    - paragraph [ref=e150]:
      - text: You can view real-time data from Queensland’s air monitoring network, health action level, and read more about air quality on
      - link "Live air data" [ref=e151] [cursor=pointer]:
        - /url: https://www.qld.gov.au/environment/management/monitoring/air
      - text: .
    - heading "Regulating air quality" [level=2] [ref=e152]
    - paragraph [ref=e153]: Our role is to not just monitor air quality, but to also regulate it.
    - paragraph [ref=e154]: We continuously monitor the quality of the air across Queensland to detect and understand pollution levels and take steps to address impacts to air quality. There are scientifically backed regulations in place to help us determine when something isn’t right, hold industries accountable, and keep the public safe.
    - paragraph [ref=e155]: "We monitor and regulate air quality in Queensland by:"
    - list [ref=e156]:
      - listitem [ref=e157]: monitoring air pollutants using a statewide network of advanced air monitoring and weather stations. These stations collect data on various pollutants and meteorological conditions that affect air quality, as well as provide real-time data for immediate issues.
      - listitem [ref=e158]: setting and regulating air quality standards (e.g. limits on pollutants) to protect public health and the environment
      - listitem [ref=e159]: imposing air emission limits on environmental authorities (licence conditions) provided to the industries based on national and international best practice source emission standards
      - listitem [ref=e160]: undertaking compliance and enforcement to ensure that industries are doing the right thing, and that penalties are enforced when air quality exceeds limits (e.g. ensuring that operators have proper dust suppression procedures or manage emissions appropriately)
      - listitem [ref=e161]: improving public awareness of air quality, such as what influences the air we breathe and how you can protect yourself when air quality may be impacted (e.g. dust storms or bushfires).
    - paragraph [ref=e162]: "Watch the video to learn more about:"
    - list [ref=e163]:
      - listitem [ref=e164]: Queensland’s air quality monitoring network
      - listitem [ref=e165]: how weather influences air quality
      - listitem [ref=e166]: pollution events.
