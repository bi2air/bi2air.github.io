        - generic [ref=e75]:
          - paragraph [ref=e76]:
            - text: We monitor general (ambient), local and incident-related air quality around Victoria through AirWatch. We use different air monitoring equipment at our
            - link "monitoring sites" [ref=e77] [cursor=pointer]:
              - /url: /how-we-monitor-air-quality
            - text: to measure small particles, visibility and gases in the air.
          - paragraph [ref=e78]:
            - text: We compare measurements from our monitoring equipment against the
            - link "air quality categories" [ref=e79] [cursor=pointer]:
              - /url: /air-quality-categories
            - text: .
          - paragraph [ref=e80]:
            - text: To let people know about potential air pollution issues, we report our AirWatch monitoring results on the
            - link "Check air and water quality map" [ref=e81] [cursor=pointer]:
              - /url: /check-air-and-water-quality
            - text: .
        - generic [ref=e83]:
          - heading "Measuring small particles – PM10" [level=2] [ref=e84]:
            - text: Measuring small particles – PM
            - subscript [ref=e85]: "10"
          - paragraph [ref=e86]:
            - text: We use different air monitoring equipment to measure levels of
            - link "PM10 air particles" [ref=e87] [cursor=pointer]:
              - /url: /pm10-particles-air
              - text: PM
              - subscript [ref=e88]: "10"
              - text: air particles
            - text: . This includes HiVols, TEOMs and DustTraks.
          - paragraph [ref=e89]:
            - text: HiVols are our reference method. This means they are the most accurate method of monitoring PM
            - subscript [ref=e90]: "10"
            - text: levels. This method involves laboratory analysis of collected samples. We use this method at our Alphington air monitoring site. We use HiVol measurements to quality-check our other PM
            - subscript [ref=e91]: "10"
            - text: monitoring across the air monitoring network.
          - paragraph [ref=e92]:
            - text: TEOMs (tapered element oscillating microbalances) are a real-time hourly measurement of PM
            - subscript [ref=e93]: "10"
            - text: levels. We use TEOMs at our general and local condition monitoring sites as our reference method equivalent to the HiVol. TEOMs provide a high-accuracy measurement of PM
            - subscript [ref=e94]: "10"
            - text: particles. We have
            - link "NATA accreditation" [ref=e95] [cursor=pointer]:
              - /url: https://nata.com.au/accredited-organisation/applied-science-group-15119-15612/
            - text: for this monitoring method.
          - paragraph [ref=e96]:
            - text: DustTraks are portable monitoring equipment. We use them at some local condition sites to measure PM
            - subscript [ref=e97]: "10"
            - text: levels. DustTraks are a good PM
            - subscript [ref=e98]: "10"
            - text: monitoring substitute when infrastructure is not available to support TEOMs. We also use DustTraks during pollution events because they are easy to deploy in the field. We regularly compare measurements between our DustTraks and TEOMs for quality control purposes.
        - generic [ref=e100]:
          - heading "Measuring small particles – PM2.5" [level=2] [ref=e101]:
            - text: Measuring small particles – PM
            - subscript [ref=e102]: "2.5"
          - paragraph [ref=e103]:
            - text: We use different air monitoring equipment to measure levels of
            - link "PM2.5 air particles" [ref=e104] [cursor=pointer]:
              - /url: /pm25-particles-air
              - text: PM
              - subscript [ref=e105]: "2.5"
              - text: air particles
            - text: . These include Partisols, BAMs, nephelometers, DustTraks and sensors.
          - paragraph [ref=e106]:
            - text: Partisols are our reference method. This means they are the most accurate method of monitoring PM
            - subscript [ref=e107]: "2.5"
            - text: levels. This method involves laboratory analysis of collected samples. We use this method at our Alphington and Footscray air monitoring sites. We use Partisol measurements to quality-check our other PM
            - subscript [ref=e108]: "2.5"
            - text: monitoring across the air monitoring network.
          - paragraph [ref=e109]:
            - text: BAMs (beta attenuation monitors) are a real-time hourly measurement of PM
            - subscript [ref=e110]: "2.5"
            - text: levels. We use BAMs at some of our general monitoring sites as our reference method equivalent to the Partisol. BAMs provide a high-accuracy measurement for PM
            - subscript [ref=e111]: "2.5"
            - text: levels. We have
            - link "NATA accreditation" [ref=e112] [cursor=pointer]:
              - /url: https://nata.com.au/accredited-organisation/applied-science-group-15119-15612/
            - text: for this monitoring method.
          - paragraph [ref=e113]:
            - text: Nephelometers measure visibility in the air. They can be used as a substitute method for measuring PM
            - subscript [ref=e114]: "2.5"
            - text: levels. They are a great real-time measure of overall particle pollution in the air. We use nephelometers at some of our general monitoring sites.
          - paragraph [ref=e115]:
            - text: DustTraks are portable monitoring equipment. We use them at some local condition sites to measure PM
            - subscript [ref=e116]: "2.5"
            - text: levels. DustTraks are a good PM
            - subscript [ref=e117]: "2.5"
            - text: monitoring substitute when infrastructure is not available to support BAMs. We also use DustTraks during pollution events because they are easy to deploy in the field. We regularly compare measurements between our DustTraks and BAMs for quality control purposes.
          - paragraph [ref=e118]:
            - text: To increase the spatial coverage of our air monitoring across Victoria, we also use PM
            - subscript [ref=e119]: "2.5"
            - text: "particle sensors. Sensors help us to:"
          - list [ref=e120]:
            - listitem [ref=e121]: monitor in more locations
            - listitem [ref=e122]: identify potential local air pollution issues.
          - paragraph [ref=e123]: "Sensor measurements are indicative and can be prone to high levels of variability. This makes it difficult to judge the accuracy of measurements from a sensor. We regularly complete sensibility checks on sensor measurements. These checks include looking at:"
          - list [ref=e124]:
            - listitem [ref=e125]: local environmental conditions
            - listitem [ref=e126]: other nearby sensors
            - listitem [ref=e127]:
              - text: other PM
              - subscript [ref=e128]: "2.5"
              - text: monitoring equipment in our network.
          - paragraph [ref=e129]:
            - text: Learn more about
            - link "particle sensors" [ref=e130] [cursor=pointer]:
              - /url: /particle-sensors
            - text: .
