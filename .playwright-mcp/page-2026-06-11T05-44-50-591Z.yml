          - list [ref=e145]:
            - listitem [ref=e146]: carbon monoxide
            - listitem [ref=e147]: nitrogen dioxide
            - listitem [ref=e148]: ozone
            - listitem [ref=e149]: sulfur dioxide.
          - paragraph [ref=e150]:
            - text: Our gas monitoring equipment provides real-time measurements that are averaged and reported hourly. We use this equipment at some of our general monitoring sites as our reference method. We have
            - link "NATA accreditation" [ref=e151] [cursor=pointer]:
