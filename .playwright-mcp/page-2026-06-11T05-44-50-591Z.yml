            - text: .
        - generic [ref=e155]:
          - heading "If pollutants are high" [level=2] [ref=e156]
          - paragraph [ref=e157]: "If an air monitor shows a high reading for a particular pollutant, we may:"
          - list [ref=e158]:
            - listitem [ref=e159]: observe air quality in the area
            - listitem [ref=e160]: check the monitoring equipment is working correctly
            - listitem [ref=e161]: compare the data with other air monitoring sites in the area
            - listitem [ref=e162]: consult with other government agencies, such as the Country Fire Authority or the Department of Energy, Environment and Climate Action.
          - paragraph [ref=e163]: "If there’s an issue with air quality, we may:"
          - list [ref=e164]:
            - listitem [ref=e165]: investigate the extent and cause of the issue
            - listitem [ref=e166]: increase monitoring
            - listitem [ref=e167]:
              - text: update the
              - link "Check air and water quality map" [ref=e168] [cursor=pointer]:
                - /url: /check-air-and-water-quality
              - text: and our
              - link "air alerts" [ref=e169] [cursor=pointer]:
                - /url: /air-alerts
            - listitem [ref=e170]: decide whether it’s happened before and whether it will impact the community
            - listitem [ref=e171]: inform relevant government agencies and the media.
        - paragraph [ref=e172]:
