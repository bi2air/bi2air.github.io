          - listitem [ref=e288]:
            - 'link "Mechanisms behind the Record-Breaking Snowfall in Obihiro, Hokkaido, Japan, in February 2025: Roles of Atmospheric Environment and a Marine Heatwave" [ref=e290] [cursor=pointer]':
              - /url: https://www.jstage.jst.go.jp/article/sola/21C/Special_Edition/21C_21C-001/_article/-char/en
            - generic "Hidetaka Hirata, Kenta Tamura, Takehiro Morioka, Tomonori Sato" [ref=e291]
            - generic [ref=e292]:
