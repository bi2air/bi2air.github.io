            - generic "Lyndon Mark P. Olaguera, Edward Kyle Badua, Alyssa Gewell A. Llorin, Faye Abigail T. Cruz, Jose Ramon T. Villarin, John A. Manalo, Marcelino Q. Villafuerte II, Jun Matsumoto" [ref=e269]: Lyndon Mark P. Olaguera, Edward Kyle Badua, Alyssa Gewell A. Llorin, F ...
