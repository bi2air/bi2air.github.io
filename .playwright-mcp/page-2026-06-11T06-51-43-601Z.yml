              - paragraph [ref=e1182]:
                - text:  None of the data is validated
                - generic [ref=e1183]: (0% validated, 0/147 records)
              - generic [ref=e1184]:
                - paragraph [ref=e1185]: The data used to compile this air quality information comes directly from the department's air monitoring network and has only undergone a preliminary quality check. Data is retrieved from the stations every hour and after quality checks, is available approximately 1 hour later.
                - paragraph [ref=e1186]: All data on this site is shown in Australian Eastern Standard Time (AEST).
                - list [ref=e1187]:
                  - listitem [ref=e1188]: If there is no data measured for a parameter, or data could not be retrieved from the monitoring station at this hour, no data is shown in the cell.
              - generic [ref=e1189]:
                - heading "About air quality categories" [level=2] [ref=e1190]
                - paragraph [ref=e1191]: Air quality categories are used to make it easier to interpret air quality data by reducing the complexity associated with different pollutant concentration units and air quality guideline values.
                - paragraph [ref=e1192]: Each air quality measurement from a monitoring station is assigned an air quality category rating based on comparison of the measurement value against the relevant air quality guideline. Five colour-coded air quality categories are used, being ‘Good’ (green), ‘Fair’ (yellow), ‘Poor’ (orange), ‘Very poor’ (red) or ‘Extremely poor’ (dark red). Values greater than the air quality guideline will be appear as ‘Poor’, ‘Very poor’ or ‘Extremely poor’.
                - paragraph [ref=e1193]:
                  - link "More information about air quality categories" [ref=e1194] [cursor=pointer]:
                    - /url: https://www.qld.gov.au/environment/pollution/monitoring/air/air-monitoring/air-quality-categories
                  - text: .
              - heading "About these Air quality parameters" [level=2] [ref=e1195]
              - generic [ref=e1196]:
                - term [ref=e1197]:
                  - text: Particle PM
                  - subscript [ref=e1198]: "2.5"
                - definition [ref=e1199]:
                  - generic [ref=e1200]:
                    - paragraph [ref=e1201]:
                      - text: Airborne particles less than 2.5 micrometres in diameter, referred to as PM
                      - subscript [ref=e1202]: "2.5"
                      - text: ", can be hazardous to human health or cause a nuisance when present in the air at elevated levels. They are capable of penetrating the lower airways of humans and can cause possible negative health effects."
                    - paragraph [ref=e1203]:
                      - text: The guideline for Particle PM
                      - subscript [ref=e1204]: "2.5"
                      - text: is 25µg/m³ (1hr avg) and 20µg/m³ (24hr avg).
                    - paragraph [ref=e1205]:
                      - text: Particle PM
                      - subscript [ref=e1206]: "2.5"
                      - text: is measured in micrograms per cubic metre.
                    - paragraph [ref=e1207]:
                      - link "More information about Particle PM2.5" [ref=e1208] [cursor=pointer]:
                        - /url: https://www.qld.gov.au/environment/pollution/monitoring/air-monitoring/trend-graphs#c
                        - text: More information about Particle PM
                        - subscript [ref=e1209]: "2.5"
                - term [ref=e1210]:
                  - text: Particle PM
                  - subscript [ref=e1211]: "10"
                - definition [ref=e1212]:
                  - generic [ref=e1213]:
                    - paragraph [ref=e1214]:
                      - text: Airborne particles less than 10 micrometres in diameter, referred to as PM
                      - subscript [ref=e1215]: "10"
                      - text: ", can be hazardous to human health or cause a nuisance when present in the air at elevated levels. They are capable of penetrating the lower airways of humans and can cause possible negative health effects."
                    - paragraph [ref=e1216]:
                      - text: The guideline for Particle PM
                      - subscript [ref=e1217]: "10"
                      - text: is 100µg/m³ (1hr avg) and 50µg/m³ (24hr avg).
                    - paragraph [ref=e1218]:
                      - text: Particle PM
                      - subscript [ref=e1219]: "10"
                      - text: is measured in micrograms per cubic metre.
                    - paragraph [ref=e1220]:
                      - link "More information about Particle PM10" [ref=e1221] [cursor=pointer]:
                        - /url: https://www.qld.gov.au/environment/pollution/monitoring/air-monitoring/trend-graphs#b
                        - text: More information about Particle PM
                        - subscript [ref=e1222]: "10"
                - term [ref=e1223]: Carbon monoxide
                - definition [ref=e1224]:
                  - generic [ref=e1225]:
                    - paragraph [ref=e1226]: Carbon monoxide is a colourless, odourless gas formed when substances containing carbon (such as petrol, gas, coal and wood) are burned with an insufficient supply of air. It has serious health impacts on humans and animals, especially those with cardiovascular disease.
                    - paragraph [ref=e1227]: The guideline for Carbon monoxide is 9ppm (8hr avg).
                    - paragraph [ref=e1228]: Carbon monoxide is measured in parts per million.
                    - paragraph [ref=e1229]:
                      - link "More information about Carbon monoxide" [ref=e1230] [cursor=pointer]:
                        - /url: https://www.qld.gov.au/environment/pollution/monitoring/air-pollution/carbon-monoxide
                - term [ref=e1231]: Nitrogen dioxide
                - definition [ref=e1232]:
                  - generic [ref=e1233]:
                    - paragraph [ref=e1234]: Nitrogen dioxide is an acidic and highly corrosive gas. Nitrogen oxides are critical components of photochemical smog. Long-term exposure to high levels of nitrogen dioxide can cause chronic lung disease and affect the senses.
                    - paragraph [ref=e1235]: The guideline for Nitrogen dioxide is 0.08ppm (1hr avg).
                    - paragraph [ref=e1236]: Nitrogen dioxide is measured in parts per million.
                    - paragraph [ref=e1237]:
                      - link "More information about Nitrogen dioxide" [ref=e1238] [cursor=pointer]:
                        - /url: https://www.qld.gov.au/environment/pollution/monitoring/air-pollution/nitrogen-oxides
                - term [ref=e1239]: Ozone
                - definition [ref=e1240]:
                  - generic [ref=e1241]:
                    - paragraph [ref=e1242]: Ozone is a colourless, highly reactive gas with a distinctive odour. The upper atmosphere ozone layer (at altitudes of 15–35km) protects the earth from harmful ultraviolet radiation from the sun. The ozone layer reduction represents a global atmosphere issue.
                    - paragraph [ref=e1243]: The guideline for Ozone is 0.1ppm (1hr avg) and 0.065ppm (8hr avg).
                    - paragraph [ref=e1244]: Ozone is measured in parts per million.
                    - paragraph [ref=e1245]:
                      - link "More information about Ozone" [ref=e1246] [cursor=pointer]:
                        - /url: https://www.qld.gov.au/environment/pollution/monitoring/air-pollution/ozone
                - term [ref=e1247]: Sulfur dioxide
                - definition [ref=e1248]:
                  - generic [ref=e1249]:
                    - paragraph [ref=e1250]:
                      - text: Sulfur dioxide (SO
                      - subscript [ref=e1251]: "2"
                      - text: ) is a colourless gas with a sharp, irritating odour. It is produced by burning fossil fuels and by the smelting of mineral ores that contain sulfur.
                    - paragraph [ref=e1252]: The guideline for Sulfur dioxide is 0.075ppm (1hr avg).
                    - paragraph [ref=e1253]: Sulfur dioxide is measured in parts per million.
                    - paragraph [ref=e1254]:
                      - link "More information about Sulfur dioxide" [ref=e1255] [cursor=pointer]:
                        - /url: https://www.qld.gov.au/environment/pollution/monitoring/air-pollution/sulfur-dioxide
                - term [ref=e1256]: Particles TSP
                - definition [ref=e1257]:
                  - generic [ref=e1258]:
                    - paragraph [ref=e1259]: Airborne particles up to about 100 micrometres in diameter are referred to as TSP (total suspended particles). These particles are generated by combustion and non-combustion processes, including windblown dust, sea salt, earthworks, mining activities, industrial processes, motor vehicle engines and fires.
                    - paragraph [ref=e1260]: The guideline for Particles TSP is 250µg/m³ (1hr avg) and 80µg/m³ (24hr avg).
                    - paragraph [ref=e1261]: Particles TSP is measured in micrograms per cubic metre.
                    - paragraph [ref=e1262]:
                      - link "More information about Particles TSP" [ref=e1263] [cursor=pointer]:
                        - /url: https://www.qld.gov.au/environment/pollution/monitoring/air-pollution/samplers
                - term [ref=e1264]: Visibility
                - definition [ref=e1265]:
                  - generic [ref=e1266]:
                    - paragraph [ref=e1267]: Aerosols and fine particles can reduce visibility. Smoke from fires or haze are common causes of poor visibility.
                    - paragraph [ref=e1268]: The guideline for Visibility is 235Mm⁻¹ (1hr avg).
                    - paragraph [ref=e1269]: Visibility is measured in inverse megametres.
                    - paragraph [ref=e1270]:
                      - link "More information about Visibility" [ref=e1271] [cursor=pointer]:
                        - /url: https://www.qld.gov.au/environment/pollution/monitoring/air-monitoring/trend-graphs#a
