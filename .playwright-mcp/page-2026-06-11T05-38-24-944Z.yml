            - paragraph [ref=e77]:
              - text: The
              - link "National Environment Protection Council" [ref=e78] [cursor=pointer]:
                - /url: https://www.nepc.gov.au/
              - text: determines the air pollutants Australian States and Territories are to monitor, and the standards that apply to them through the
              - link "National Environment Protection (Ambient Air Quality) Measure (NEPM)" [ref=e79] [cursor=pointer]:
                - /url: https://www.nepc.gov.au/nepms/ambient-air-quality
              - text: . NSW monitors six of these criteria pollutants, and reports annually on air quality compliance with these standards. NSW also monitors visibility and ammonia and assesses these against our own benchmarks
            - heading "Air pollutants we monitor" [level=2] [ref=e80]
            - paragraph [ref=e81]:
              - text: Our air quality monitoring networks provide measurements for measurements for 6 criteria pollutants, as well as visibility and ammonia. We also conduct
              - link "short-term campaign monitoring activities" [ref=e82] [cursor=pointer]:
