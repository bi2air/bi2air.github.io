                - paragraph [ref=e149]: An impact statement and draft varied measure are required as part of the statutory process to vary a National Environment Protection Measure and provides an opportunity for stakeholders to review and comment on the supporting evidence to vary the Ambient Air Quality NEPM particles standards. The public consultation period for the Impact Statement and draft varied measure is now closed.
                - list [ref=e150]:
