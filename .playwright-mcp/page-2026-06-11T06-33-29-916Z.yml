                - text: regarding detailed implementation information for this NEPM. Decisions about the way in which NEPMs are implemented are made by each jurisdiction individually.
              - heading "Ambient Air Quality NEPM Goal" [level=2] [ref=e118]
              - paragraph [ref=e119]: To achieve National Environment Protection Standards as assessed in accordance with (set) monitoring protocol.
              - heading "Desired Environmental Outcomes" [level=2] [ref=e120]
              - paragraph [ref=e121]: Ambient air quality that allows for the adequate protection of human health and well-being.
              - heading "Development of the NEPM" [level=2] [ref=e122]
              - generic [ref=e123]:
                - heading "Variation to the Ambient Air Quality NEPM - 2021" [level=3] [ref=e124]
                - paragraph [ref=e125]: On 15 April 2021, the National Environment Protection Council (NEPC) approved a variation to the Ambient Air Quality NEPM standards for ozone, nitrogen dioxide and sulfur dioxide.
                - list [ref=e126]:
                  - listitem [ref=e127]:
                    - link "Variation to the Ambient Air Quality NEPM" [ref=e128] [cursor=pointer]:
                      - /url: /nepms/ambient-air-quality/variation-ambient-air-quality-nepm-ozone-nitrogen-dioxide-and-sulfur
              - generic [ref=e129]:
                - heading "Proposed variation to the Ambient Air Quality NEPM - 2019" [level=3] [ref=e130]
                - paragraph [ref=e131]: Public consultation for the impact statement and draft varied measure has now closed. This consultation provides an opportunity for the community to review and comment on the supporting evidence to vary the Ambient Air Quality NEPM standards for ozone, nitrogen dioxide and sulfur dioxide.
                - list [ref=e132]:
                  - listitem [ref=e133]:
                    - link "Proposed variation to the National Environment Protection (Ambient Air Quality) Measure" [ref=e134] [cursor=pointer]:
