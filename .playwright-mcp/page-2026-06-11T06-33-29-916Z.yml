                    - text: "- submissions are now available"
              - generic [ref=e135]:
                - heading "Notice of intention to vary the Ambient Air Quality NEPM - 2019" [level=3] [ref=e136]
                - paragraph [ref=e137]: On 7 December 2018, Ministers signaled their intention to vary the National Environment Protection (Ambient Air Quality) Measure to strengthen its ozone, nitrogen dioxide and sulfur dioxide standards. This variation will reflect latest scientific understanding and will allow for an adequate level of health protection from the impacts of air pollution from these pollutants for the Australian community.
                - list [ref=e138]:
