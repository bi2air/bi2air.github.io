            - heading "Air" [level=1] [ref=e70]
            - paragraph [ref=e76]: Breathing clean air is essential for health and wellbeing. The EPA strives to keep our air clean by measuring air quality, setting standards, regulating industries, and community reporting of air pollution.
            - generic [ref=e79]:
              - generic [ref=e82]:
                - 'link "Air: NSW overview" [ref=e84] [cursor=pointer]':
                  - /url: /Your-environment/Air/air-nsw-overview
                - generic [ref=e85]: The EPA works with other government agencies, industry, and the community to keep our air clean. Find out how to report smoky vehicles or other air pollution to us, and how environment protection licences for industry help control air pollution.
                - generic [ref=e86]: east
              - generic [ref=e89]:
                - link "Clean Air Strategy 2021-30" [ref=e91] [cursor=pointer]:
                  - /url: /Your-environment/Air/clean-air-nsw
                - generic [ref=e92]: The NSW Clean Air Strategy presents the whole of NSW Government approach to improving air quality and protecting communities.
                - generic [ref=e93]: east
              - generic [ref=e96]:
                - link "Non-road diesel and marine emissions" [ref=e98] [cursor=pointer]:
                  - /url: /Your-environment/Air/non-road-diesel-marine-emissions
                - generic [ref=e99]: Construction and mining equipment, rail locomotives, ports equipment and ships can all have diesel engines - a significant source of air pollution. Here’s what we’re doing to reduce these diesel emissions, and why it’s so important.
                - generic [ref=e100]: east
              - generic [ref=e103]:
                - link "Industrial emissions" [ref=e105] [cursor=pointer]:
                  - /url: /Your-environment/Air/industrial-emissions
                - generic [ref=e106]: Discover how the EPA measures and regulates emissions from industry - through legislation, air emissions standards and licensing. Read our studies and policies about these emissions, and learn about the obligations of industries.
                - generic [ref=e107]: east
              - generic [ref=e110]:
                - link "Open burning - reducing air pollution from fires" [ref=e112] [cursor=pointer]:
                  - /url: /Your-environment/Air/open-burning-reducing-pollution
                - generic [ref=e113]: You are only allowed to light a fire outside in certain situations. Check what fires are allowed in your area, and whether you need a permit to burn.
                - generic [ref=e114]: east
              - generic [ref=e117]:
                - link "Regional air quality" [ref=e119] [cursor=pointer]:
