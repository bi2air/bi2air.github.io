          - generic [ref=e394]:
            - heading "3. Summarising air quality into AQCs" [level=3] [ref=e395]
            - paragraph [ref=e396]: The hourly data measured at air quality stations determines the AQC for each pollutant. The highest pollutant AQC at each station becomes the station AQC, with the highest station AQC in each region becoming the regional AQC. This is stepped out further below by using air quality data from the Lidcombe station in the Central West Sydney region.
            - paragraph [ref=e397]:
              - img "graph with dots showing aqc" [ref=e398]
            - list [ref=e399]:
              - listitem [ref=e400]:
                - strong [ref=e401]: Pollutant concentration and AQC
                - text: categorise each pollutant measured at a site with one of the 5 colour codes. The colour code is determined by comparing the hourly measurement for each parameter against the cut-off values. In the graphic above, PM10 at Lidcombe is colour-coded yellow ('Fair' air quality) as the hourly measurement for PM10 falls in the 'Fair' category. Hourly measurements of all other parameters are 'Good' (green).
              - listitem [ref=e402]:
                - strong [ref=e403]: Station AQC
                - text: summarises air quality for a site, by comparing all pollutants measured at the site. It is determined from the highest category when comparing all pollutant AQCs at a site. In the graphic above, the highest category at Lidcombe site is colour-coded yellow, due to PM10, which corresponds to 'Fair' air quality.
              - listitem [ref=e404]:
                - strong [ref=e405]: Regional AQC
                - text: summarises air quality for each region (e.g. Central West Sydney). It is determined by the highest site AQC when comparing all sites across a region (hence each region has a colour-coded regional AQC). In the graphic, Regional AQC for Central West Sydney is colour-coded yellow because at Lidcombe station air quality is 'Fair' due to PM10 and has the highest site AQC when compared to other stations in the region.
            - paragraph [ref=e406]: .
          - generic [ref=e408]:
            - heading "What the air quality categories mean for you" [level=2] [ref=e409]
            - paragraph [ref=e410]:
              - text: The AQC colours provide information at a glance to help people plan their activities, as shown in the
              - link "Environmental Health Standing Committee's Activity guide" [ref=e411] [cursor=pointer]:
                - /url: https://www.airquality.nsw.gov.au/health-advice#activity
              - text: .
            - paragraph [ref=e412]: By using the AQC colours and following general health recommendations stated in the activity guide, you can take steps to limit your exposure to air pollution. For example, if the AQC at your local station is ‘Very Poor’, the health advice in the activity guide can assist you in understanding how this might affect your health and recommend actions to take.
            - heading "Information for sensitive groups" [level=3] [ref=e413]
            - paragraph [ref=e414]: Some people may be more sensitive to air pollution. Sensitive groups include people with lung disease or heart disease, children, older adults, pregnant women.
            - paragraph [ref=e415]:
              - text: If you need information specific to people with asthma, visit the
              - link "Asthma Australia" [ref=e416] [cursor=pointer]:
                - /url: https://asthma.org.au
              - text: website to access their free helpline.
            - paragraph [ref=e417]:
              - text: Anyone with persistent symptoms should seek medical advice or call Health Direct Australia on
              - link "1800 022 222" [ref=e418] [cursor=pointer]:
                - /url: tel:1800022222
            - paragraph [ref=e419]:
              - link "View the activity guide here" [ref=e420] [cursor=pointer]:
                - /url: https://www.airquality.nsw.gov.au/health-advice#activity
