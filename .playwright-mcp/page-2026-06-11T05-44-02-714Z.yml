          - paragraph [ref=e80]: Air quality categories help us understand air quality and modify our activities if pollution levels are high.
          - generic [ref=e82]:
            - paragraph [ref=e83]: Air quality categories (AQC) are colour indicators used to summarise air quality measurements. In New South Wales, five colour indicators are used to classify air quality as either 'Good', 'Fair', 'Poor', 'Very Poor' or 'Extremely Poor'.
            - paragraph [ref=e84]: The AQC is determined by measurements of key air pollutants we monitor at our monitoring locations.
          - generic [ref=e86]:
            - heading "How we measure and report air quality data" [level=2] [ref=e87]
            - heading "1. Collect data from each site" [level=3] [ref=e88]:
