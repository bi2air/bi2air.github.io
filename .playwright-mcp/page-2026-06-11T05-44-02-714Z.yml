                - strong [ref=e92]: network of air quality sensors and instruments
              - text: at monitoring stations around New South Wales.
            - paragraph [ref=e93]: Data measurement readings are numbers with measurement units, from scientific instruments for each air pollutant we measure. The measurement units for the different pollutants and visibility are in the table below.
